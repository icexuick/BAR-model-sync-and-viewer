<script>
(function() {
    const ORB_CONFIG = {
        corafus:   { pos: [0, 60, 0], size: 32, type: 'team' },
        armafus:   { pos: [0, 60, 0], size: 28, type: 'team' },
        legafus:   { pos: [0, 60, 0], size: 36, type: 'team' },
        corfus:    { pos: [0, 51, 0], size: 23, type: 'team' },
        legfus:    { pos: [0, 10, 0], size: 23, type: 'team' },
        armjuno:   { pos: [0, 72, 0], size: 13, type: 'juno' },
        corjuno:   { pos: [0, 72, 0], size: 13, type: 'juno' },
        legjuno:   { pos: [0, 69, 0], size: 9,  type: 'juno' },
        corgate:   { pos: [0, 42, 0], size: 11, type: 'shield' },
        armgate:   { pos: [0, 23.5, -5], size: 14.5, type: 'shield' },
        leggatet3: { pos: [0, 45, 0], size: 18, type: 'shield' },
        legdeflector: { pos: [0, 21, 0], size: 12, type: 'shield' },
        corgatet3: { pos: [0, 75, -1], size: 18, type: 'shield' },
        armgatet3: { pos: [0, 42, -6], size: 20, type: 'shield' },
        corafust3: { pos: [0, 120, 0], size: 64, type: 'team' },
        armafust3: { pos: [0, 120, 0], size: 56, type: 'team' },
        legafust3: { pos: [0, 120, 0], size: 72, type: 'team' },
    };

    // Fixed colors per type — color2 is the dominant hue, color1 is the edge/rim tint
    const JUNO_COLOR1 = [0.95, 0.4, 0.35]; // warm reddish rim
    const JUNO_COLOR2 = [0.8, 0.12, 0.1]; // deep red core
    const SHIELD_COLOR1 = [0.5, 0.85, 0.6]; // bright green rim
    const SHIELD_COLOR2 = [0.1, 0.55, 0.15]; // deep green core

    const vertexShader = `
        varying vec3 vModelPos;
        varying float vOpac;
        varying vec3 vMixedColor;

        uniform float time;
        uniform float orbRadius;
        uniform vec3 color1;
        uniform vec3 color2;

        void main() {
            // Breathing: radius oscillates
            float r = orbRadius + sin(time) - 1.0;
            vec3 pos = position * r;
            vModelPos = position * orbRadius; // unscaled for noise sampling

            // Fresnel: dot(normal, viewDir)
            vec4 worldPos = modelMatrix * vec4(pos, 1.0);
            vec3 worldNormal = normalize(normalMatrix * normal);
            vec3 camToVert = normalize(cameraPosition - worldPos.xyz);
            float angle = abs(dot(worldNormal, camToVert));
            vOpac = angle;

            // Mix colors by fresnel
            vMixedColor = mix(color1, color2, angle);

            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    `;

    const fragmentShader = `
        precision highp float;

        varying vec3 vModelPos;
        varying float vOpac;
        varying vec3 vMixedColor;

        uniform float time;

        const float PI = 3.14159265359;

        // Hash function for noise
        float hash13(vec3 p3) {
            p3 = fract(p3 * 44.38975);
            p3 += dot(p3, p3.yzx + 19.19);
            return fract((p3.x + p3.y) * p3.z);
        }

        float noise12(vec2 p) {
            vec2 ij = floor(p);
            vec2 xy = fract(p);
            xy = 3.0 * xy * xy - 2.0 * xy * xy * xy;
            float a = hash13(vec3(ij, 0.0));
            float b = hash13(vec3(ij + vec2(1.0, 0.0), 0.0));
            float c = hash13(vec3(ij + vec2(0.0, 1.0), 0.0));
            float d = hash13(vec3(ij + vec2(1.0, 1.0), 0.0));
            return mix(mix(a, b, xy.x), mix(c, d, xy.x), xy.y);
        }

        float Fbm12(vec2 P) {
            float sum = 0.0;
            float amp = 0.8;
            vec2 pp = P;
            for (int i = 0; i < 2; ++i) {
                amp *= 0.80;
                sum += amp * noise12(pp);
                pp *= 1.8;
            }
            return sum;
        }

        vec2 RadialCoords(vec3 a_coords) {
            vec3 n = normalize(a_coords);
            float lon = atan(n.z, n.x);
            float lat = acos(clamp(n.y, -1.0, 1.0));
            vec2 sc = vec2(lon, lat) / PI;
            return vec2(sc.x * 0.5 + 0.5, 1.0 - sc.y);
        }

        vec3 RotAroundY(vec3 p) {
            float ra = -time * 0.5;
            float c = cos(ra), s = sin(ra);
            return vec3(c * p.x + s * p.z, p.y, -s * p.x + c * p.z);
        }

        float mirroredRepeat(float x, float repeats) {
            x *= repeats;
            float i = floor(x);
            float f = fract(x);
            if (mod(i, 2.0) == 1.0) f = 1.0 - f;
            return f;
        }

        vec3 LightningOrb2(vec2 vUv, vec3 color) {
            vUv.x = mirroredRepeat(vUv.x, 2.0);
            vec2 uv = vUv * 2.0 - 1.0; // NORM2SNORM

            float strength = 0.04;
            float dx = 0.225;

            float t = 0.0;
            for (int k = -4; k < 3; ++k) {
                vec2 thisUV = uv;
                thisUV.x -= dx * float(k);
                thisUV.y += 2.0 * float(k);
                vec2 fbmUV = vec2(thisUV.x + time, thisUV.y + 0.3 * time);
                t += abs(strength / (thisUV.x + (3.0 * Fbm12(fbmUV) - 1.9)));
            }
            return color * t;
        }

        void main() {
            vec3 noiseVec = RotAroundY(vModelPos);
            vec2 vUv = RadialCoords(noiseVec);
            // Base glow from fresnel-mixed color
            vec3 baseGlow = vMixedColor * 0.15;
            // Lightning lines on top
            vec3 col = LightningOrb2(vUv, vMixedColor);
            col = baseGlow + col;
            float alpha = length(col);
            gl_FragColor = vec4(col, alpha);
        }
    `;

    // Radar/jammer blink light config: piece name patterns → color
    // req: if set, pattern only matches when unit has the corresponding GLB flag
    const BLINK_PATTERNS = [
        { match: /^blink/i,       color: [0.1, 0.9, 0.2], type: 'radar', req: 'has_radar' },   // green (radar/sonar units only)
        { match: /^radarlight/i,  color: [0.1, 0.9, 0.2], type: 'radar', req: 'has_radar' },   // green
        { match: /dish$/i,        color: [0.1, 0.9, 0.2], type: 'radar', req: 'has_radar' },   // green (rdish, ldish, dish)
        { match: /^jam$/i,        color: [0.9, 0.1, 0.1], type: 'jammer', req: 'has_jammer' }, // red (jammer units only)
        { match: /^pointlight/i,  color: [0.9, 0.1, 0.1], type: 'jammer', req: 'has_jammer' }, // red
        { match: /^cloaklight/i,  color: [0.9, 0.1, 0.1], type: 'jammer', req: 'has_jammer' }, // red
    ];

    function waitForCtx() {
        if (window._editorCtx) { initOrbs(window._editorCtx); initBlinkLights(window._editorCtx); }
        else setTimeout(waitForCtx, 200);
    }
    waitForCtx();

    function initOrbs(ctx) {
        const { unitName, modelScene, scene, timeUniform, teamColor, THREE } = ctx;
        if (!unitName || !modelScene) return;

        const cfg = ORB_CONFIG[unitName];
        if (!cfg) return;

        // Derive colors based on type
        let c1, c2;
        if (cfg.type === 'team') {
            const tc = teamColor; // already a THREE.Color
            c1 = [tc.r * 0.87 + 0.13, tc.g * 0.87 + 0.13, tc.b * 0.87 + 0.13];
            c2 = [tc.r * 0.87, tc.g * 0.87, tc.b * 0.87];
        } else if (cfg.type === 'juno') {
            c1 = JUNO_COLOR1;
            c2 = JUNO_COLOR2;
        } else { // shield
            c1 = SHIELD_COLOR1;
            c2 = SHIELD_COLOR2;
        }

        const orbGeo = new THREE.SphereGeometry(1, 32, 24);
        const orbMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                time: timeUniform,
                orbRadius: { value: cfg.size },
                color1: { value: new THREE.Vector3(c1[0], c1[1], c1[2]) },
                color2: { value: new THREE.Vector3(c2[0], c2[1], c2[2]) },
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide,
        });

        const orbMesh = new THREE.Mesh(orbGeo, orbMat);
        orbMesh.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
        orbMesh.renderOrder = 999;
        orbMesh.layers.enable(1); // Layer 1 = VFX, excluded from SSAO depth/normal pass
        orbMesh.raycast = () => {}; // Exclude from raycasting

        modelScene.add(orbMesh);

        // Subtle radial glow sprite behind the orb in the orb's color
        const gc = document.createElement('canvas'); gc.width = 64; gc.height = 64;
        const gx = gc.getContext('2d'), gg = gx.createRadialGradient(32,32,0,32,32,32);
        gg.addColorStop(0,'rgba(255,255,255,1)'); gg.addColorStop(0.3,'rgba(255,255,255,0.6)'); gg.addColorStop(1,'rgba(255,255,255,0)');
        gx.fillStyle = gg; gx.fillRect(0,0,64,64);
        const glowTex = new THREE.CanvasTexture(gc);
        const glowColor = new THREE.Color(c2[0] * 0.70 + 0.30, c2[1] * 0.70 + 0.30, c2[2] * 0.70 + 0.30);
        const glowSize = cfg.size * 2.52; // ~26% larger diameter than orb
        const glowMat = new THREE.SpriteMaterial({
            map: glowTex,
            color: glowColor,
            transparent: true,
            opacity: 0.22,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        });
        const glowSprite = new THREE.Sprite(glowMat);
        glowSprite.scale.set(glowSize, glowSize, 1);
        glowSprite.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
        glowSprite.renderOrder = 998;
        glowSprite.layers.enable(1); // Excluded from SSAO
        glowSprite.raycast = () => {};
        modelScene.add(glowSprite);

        // White flash sphere — same size, pulses from transparent to white occasionally
        const flashMat = new THREE.SpriteMaterial({
            map: glowTex,
            color: new THREE.Color(1, 1, 1),
            transparent: true,
            opacity: 0,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        });
        const flashSize = glowSize * 0.95;
        const flashSprite = new THREE.Sprite(flashMat);
        flashSprite.scale.set(flashSize, flashSize, 1);
        flashSprite.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
        flashSprite.renderOrder = 997;
        flashSprite.layers.enable(1);
        flashSprite.raycast = () => {};
        modelScene.add(flashSprite);

        // PointLight in orb center — colored by orb type
        const orbLight = new THREE.PointLight(
            new THREE.Color(c2[0], c2[1], c2[2]),
            5000,             // intensity (physically correct units)
            cfg.size * 3.11,  // distance/range (+30%, calibrated from corfus)
            2                 // decay
        );
        orbLight.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
        orbLight.layers.enable(1);
        modelScene.add(orbLight);

        // Tweakable params — exposed for lil-gui via window._orbParams
        const orbParams = {
            lightIntensity: 5000,
            lightRange: cfg.size * 3.11,
            glowOpacity: 0.23,
            glowSizeMult: 2.52,
            flashPeak: 0.35,
        };
        window._orbParams = orbParams;
        window._orbRefs = { orbLight, glowMat, glowSprite, flashMat, flashSprite };

        // Sync glow sprite breathing with orb shader (orbRadius + sin(time) - 1.0)
        const baseOrbR = cfg.size;
        orbMesh.onBeforeRender = function() {
            const t = timeUniform.value;
            const breath = (baseOrbR + Math.sin(t) - 1.0) / baseOrbR;
            const s = cfg.size * orbParams.glowSizeMult * breath;
            glowSprite.scale.set(s, s, 1);
            const fs = s * 0.95;
            flashSprite.scale.set(fs, fs, 1);
            glowMat.opacity = orbParams.glowOpacity + 0.05 * Math.sin(t * 1.3);
            const raw = Math.sin(t * 0.54) * 0.5 + 0.5;
            flashMat.opacity = Math.pow(raw, 8) * orbParams.flashPeak;
            var lPulse = 0.7 + 0.3 * Math.sin(t * 0.8);
            orbLight.intensity = orbParams.lightIntensity * breath * lPulse;
            orbLight.distance = orbParams.lightRange;
        };

        // If team-colored, update color when team color changes
        if (cfg.type === 'team') {
            window._orbUpdateTeamColor = (hexColor) => {
                const tc = new THREE.Color(hexColor);
                orbMat.uniforms.color1.value.set(tc.r * 0.87 + 0.13, tc.g * 0.87 + 0.13, tc.b * 0.87 + 0.13);
                orbMat.uniforms.color2.value.set(tc.r * 0.87, tc.g * 0.87, tc.b * 0.87);
                glowMat.color.set(tc.r * 0.87 * 0.70 + 0.30, tc.g * 0.87 * 0.70 + 0.30, tc.b * 0.87 * 0.70 + 0.30);
                orbLight.color.set(tc.r * 0.87, tc.g * 0.87, tc.b * 0.87);
            };
        }
    }

    function initBlinkLights(ctx) {
        const { modelScene, timeUniform, THREE } = ctx;
        if (!modelScene) return;

        // Read radar/jammer flags from model metadata
        let hasRadar = false, hasJammer = false;
        modelScene.traverse(node => {
            if (node.userData && node.userData.has_radar) hasRadar = true;
            if (node.userData && node.userData.has_jammer) hasJammer = true;
        });

        // Detect if model is mobile (vehicle/kbot/ship/aircraft) via piece names
        let isMobile = false;
        modelScene.traverse(node => { if (/(wheel|track|leg|foot|thigh|wing|pelvis|torso)/i.test(node.name)) isMobile = true; });
        const blinkRange = isMobile ? 18 : 30;

        // Shared radial glow texture for blink sprites
        const bc = document.createElement('canvas'); bc.width = 64; bc.height = 64;
        const bx = bc.getContext('2d'), bg = bx.createRadialGradient(32,32,0,32,32,32);
        bg.addColorStop(0,'rgba(255,255,255,1)'); bg.addColorStop(0.3,'rgba(255,255,255,0.6)'); bg.addColorStop(1,'rgba(255,255,255,0)');
        bx.fillStyle = bg; bx.fillRect(0,0,64,64);
        const blinkTex = new THREE.CanvasTexture(bc);

        const lights = [];
        function addBlinkLight(node, pat) {
            const isRadar = pat.type === 'radar';
            const lIntensity = isRadar ? 5000 : 15000;
            const lRange = isRadar ? 20 : blinkRange;
            const light = new THREE.PointLight(
                new THREE.Color(pat.color[0], pat.color[1], pat.color[2]),
                lIntensity, lRange, 2
            );
            // Parent to piece node so light moves with animations
            light.position.set(0, 0, 0);
            light.layers.enable(1);
            node.add(light);

            const glowMat = new THREE.SpriteMaterial({
                map: blinkTex,
                color: new THREE.Color(pat.color[0], pat.color[1], pat.color[2]),
                transparent: true, opacity: 0.5,
                blending: THREE.AdditiveBlending, depthWrite: false,
            });
            const glow = new THREE.Sprite(glowMat);
            const glowSize = isRadar ? 5 : 30;
            glow.scale.set(glowSize, glowSize, 1);
            glow.position.set(0, 0, 0);
            glow.renderOrder = 998;
            glow.layers.enable(1);
            glow.raycast = () => {};
            node.add(glow);

            lights.push({ light, glow, glowMat, type: pat.type, baseIntensity: lIntensity });
        }

        const _flags = { has_radar: hasRadar, has_jammer: hasJammer };
        let hasJammerLight = false;
        modelScene.traverse(node => {
            for (const pat of BLINK_PATTERNS) {
                if (pat.req && !_flags[pat.req]) continue;
                if (pat.match.test(node.name)) {
                    addBlinkLight(node, pat);
                    if (pat.type === 'jammer') hasJammerLight = true;
                    break;
                }
            }
        });

        // Fallback: jammer unit with no matching blink piece — add red light
        // to the highest spinning piece (most jammers have a rotating dish/strut)
        if (hasJammer && !hasJammerLight) {
            let spinNames = new Set();
            modelScene.traverse(node => {
                if (node.userData && node.userData.spin_pieces) {
                    node.userData.spin_pieces.forEach(n => {
                        if (!n.startsWith('Spin_')) spinNames.add(n.toLowerCase());
                    });
                }
            });
            if (spinNames.size > 0) {
                let bestNode = null, bestY = -Infinity;
                modelScene.traverse(node => {
                    if (spinNames.has(node.name.toLowerCase())) {
                        node.updateWorldMatrix(true, false);
                        const wp = new THREE.Vector3();
                        node.getWorldPosition(wp);
                        if (wp.y > bestY) { bestY = wp.y; bestNode = node; }
                    }
                });
                if (bestNode) {
                    addBlinkLight(bestNode, { color: [0.9, 0.1, 0.1], type: 'jammer' });
                }
            }
        }

        if (lights.length === 0) return;

        // Tweakable params — exposed for lil-gui via window._blinkParams
        const blinkParams = {
            intensity: 15000,
            range: blinkRange,
        };
        window._blinkParams = blinkParams;

        // Animate: gentle pulse with occasional blink
        let firstMesh = null;
        modelScene.traverse(c => { if (!firstMesh && c.isMesh && c.visible) firstMesh = c; });
        if (firstMesh) {
            const origRender = firstMesh.onBeforeRender;
            firstMesh.onBeforeRender = function() {
                if (origRender) origRender.call(this);
                const t = timeUniform.value;
                for (const l of lights) {
                    // Slow on/off pulse: goes from 0 to 1 and back
                    const speed = l.type === 'radar' ? 1.6 : 0.8;
                    const raw = Math.sin(t * speed) * 0.5 + 0.5;
                    const anim = raw * raw; // ease-in for smoother off phase
                    l.light.intensity = l.baseIntensity * anim;
                    l.light.distance = blinkParams.range;
                    const opacityMax = l.type === 'jammer' ? 0.21 : 0.6;
                    l.glowMat.opacity = opacityMax * anim;
                }
            };
        }
    }
})();

// --- Cloak system ---
window._barCloakSetup = function(opts) {
    var canCloak = opts.canCloak, initCloaked = opts.initCloaked, cloakUniform = opts.cloakUniform, modelScene = opts.modelScene;
    var cloakTarget = 0.0, cloakActive = false, cloakDecloakTimer = null;
    var cloakToggleButton = document.getElementById('cloak-toggle-button');
    var cloakToggleWrapper = document.getElementById('cloak-toggle-wrapper');
    function setCloakState(on) {
        cloakActive = on;
        cloakTarget = on ? 1.0 : 0.0;
        if (cloakToggleButton) cloakToggleButton.classList.toggle('is-active', on);
    }
    window._barDecloak = function() {
        if (!canCloak || !cloakActive) return;
        cloakTarget = 0.0;
        if (cloakDecloakTimer) clearTimeout(cloakDecloakTimer);
        cloakDecloakTimer = setTimeout(function() { if (cloakActive) cloakTarget = 1.0; cloakDecloakTimer = null; }, 3000);
    };
    if (canCloak || initCloaked) {
        if (cloakToggleButton) cloakToggleButton.style.display = 'flex';
        if (cloakToggleWrapper) cloakToggleWrapper.style.display = 'flex';
        if (cloakToggleButton) cloakToggleButton.addEventListener('click', function() { setCloakState(!cloakActive); if (cloakDecloakTimer) { clearTimeout(cloakDecloakTimer); cloakDecloakTimer = null; } });
        if (initCloaked) setTimeout(function() { setCloakState(true); }, 1500);
    } else {
        if (cloakToggleButton) cloakToggleButton.style.display = 'none';
        if (cloakToggleWrapper) cloakToggleWrapper.style.display = 'none';
    }
    return {
        update: function(clockDelta) {
            var prev = cloakUniform.value;
            var speed = 3.0 * clockDelta;
            cloakUniform.value += (cloakTarget - cloakUniform.value) * Math.min(speed, 1.0);
            if (Math.abs(cloakUniform.value - cloakTarget) < 0.001) cloakUniform.value = cloakTarget;
            var shadowOff = cloakUniform.value >= 0.5, prevOff = prev >= 0.5;
            if (shadowOff !== prevOff) modelScene.traverse(function(c) { if (c.isMesh && c.visible) c.castShadow = !shadowOff; });
        }
    };
};
</script>
