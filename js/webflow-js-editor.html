<script type="module">
    import GUI from 'https://unpkg.com/three@0.160.0/examples/jsm/libs/lil-gui.module.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('editor') || urlParams.has('buildpic')) {
        function waitForCtx() {
            if (window._editorCtx) initEditor(window._editorCtx);
            else setTimeout(waitForCtx, 200);
        }
        waitForCtx();
    }

    const DEG2RAD = Math.PI / 180;
    const RAD2DEG = 180 / Math.PI;

    function initEditor(ctx) {
        const { VIEWER_CONFIG, controls, material, renderer, directionalLight, directionalLight2,
                ambientLight, ssaoPass, groundMesh, loadHDR, modelScene, lightGroup, scene, buildpicMode } = ctx;
        let areShadowsVisible = true;

        const gui = new GUI({ title: buildpicMode ? 'Buildpic Editor' : 'Unit Lab' });

        // --- Buildpic rotation controls (only in buildpic mode) ---
        if (buildpicMode && modelScene && lightGroup && scene) {
            const fBp = gui.addFolder('Buildpic Rotation');
            fBp.open();
            const bpState = {
                modelRotY: modelScene.rotation.y * RAD2DEG,
                lightRotY: lightGroup.rotation.y * RAD2DEG,
                hdrRotY: (window._hdrRotY || 0) * RAD2DEG,
                shadowOpacity: groundMesh ? groundMesh.material.opacity : 0.4
            };
            fBp.add(bpState, 'modelRotY', -180, 180, 1).name('Model Y (deg)').onChange(v => {
                modelScene.rotation.y = v * DEG2RAD;
            });
            fBp.add(bpState, 'lightRotY', -180, 180, 1).name('Light Y (deg)').onChange(v => {
                lightGroup.rotation.y = v * DEG2RAD;
            });
            fBp.add(bpState, 'hdrRotY', -180, 180, 1).name('HDR Y (deg)').onChange(v => {
                window._hdrRotY = v * DEG2RAD;
            });
            fBp.add(bpState, 'shadowOpacity', 0, 1, 0.05).name('Shadow Opacity').onChange(v => {
                if (groundMesh) groundMesh.material.opacity = v;
            });

            // Copy all buildpic-relevant settings to clipboard
            const copyObj = {
                copySettings: () => {
                    const s = {
                        modelRotY: bpState.modelRotY,
                        lightRotY: bpState.lightRotY,
                        hdrRotY: bpState.hdrRotY,
                        keyLightIntensity: directionalLight.intensity,
                        keyLightX: +directionalLight.position.x.toFixed(2),
                        keyLightY: +directionalLight.position.y.toFixed(2),
                        keyLightZ: +directionalLight.position.z.toFixed(2),
                        fillLightIntensity: directionalLight2.intensity,
                        fillLightX: +directionalLight2.position.x.toFixed(2),
                        fillLightY: +directionalLight2.position.y.toFixed(2),
                        fillLightZ: +directionalLight2.position.z.toFixed(2),
                        ambientLightIntensity: ambientLight.intensity,
                        envMapIntensity: material.envMapIntensity,
                        toneMappingExposure: renderer.toneMappingExposure,
                        shadowOpacity: bpState.shadowOpacity
                    };
                    const json = JSON.stringify(s, null, 2);
                    navigator.clipboard.writeText(json).then(() => {
                        console.log('Buildpic settings copied to clipboard');
                        alert('Settings copied to clipboard!');
                    }).catch(() => {
                        console.log('Buildpic settings:', json);
                        prompt('Copy these settings:', json);
                    });
                }
            };
            fBp.add(copyObj, 'copySettings').name('Copy Settings to Clipboard');
        }

        const fGen = gui.addFolder('General');
        fGen.add(VIEWER_CONFIG, 'mouseRotateSpeed', 0.1, 2.0).onChange(v => controls.rotateSpeed = v);
        fGen.add(VIEWER_CONFIG, 'autoRotationSpeed', 0, 2.0);
        fGen.addColor(VIEWER_CONFIG, 'teamColor').onChange(v => { if (material.userData.shader) material.userData.shader.uniforms.teamColor.value.set(v); if (window._orbUpdateTeamColor) window._orbUpdateTeamColor(v); });
        fGen.add(VIEWER_CONFIG, 'hdrUrl').onFinishChange(v => loadHDR(v));
        fGen.add(VIEWER_CONFIG, 'envMapIntensity', 0, 5).onChange(v => material.envMapIntensity = v);
        fGen.add(VIEWER_CONFIG, 'toneMappingExposure', 0.1, 4.0).onChange(v => renderer.toneMappingExposure = v);

        const fLights = gui.addFolder('Lights Setup');
        const fKey = fLights.addFolder('Key Light (Shadows)');
        fKey.addColor(VIEWER_CONFIG, 'keyLightColor').onChange(v => directionalLight.color.set(v));
        fKey.add(VIEWER_CONFIG, 'keyLightIntensity', 0, 5).onChange(v => directionalLight.intensity = v);
        fKey.add(VIEWER_CONFIG, 'keyLightX', -10, 10).onChange(v => directionalLight.position.x = v);
        fKey.add(VIEWER_CONFIG, 'keyLightY', -10, 10).onChange(v => directionalLight.position.y = v);
        fKey.add(VIEWER_CONFIG, 'keyLightZ', -10, 10).onChange(v => directionalLight.position.z = v);
        fKey.add(VIEWER_CONFIG, 'shadowRadius', 0, 25).onChange(v => directionalLight.shadow.radius = v);
        fKey.add(VIEWER_CONFIG, 'shadowBlurSamples', 0, 25).step(1).onChange(v => directionalLight.shadow.blurSamples = v);

        const fFill = fLights.addFolder('Fill Light');
        fFill.addColor(VIEWER_CONFIG, 'fillLightColor').onChange(v => directionalLight2.color.set(v));
        fFill.add(VIEWER_CONFIG, 'fillLightIntensity', 0, 5).onChange(v => directionalLight2.intensity = v);
        fFill.add(VIEWER_CONFIG, 'fillLightX', -10, 10).onChange(v => directionalLight2.position.x = v);
        fFill.add(VIEWER_CONFIG, 'fillLightY', -10, 10).onChange(v => directionalLight2.position.y = v);
        fFill.add(VIEWER_CONFIG, 'fillLightZ', -10, 10).onChange(v => directionalLight2.position.z = v);

        const fAmb = fLights.addFolder('Ambient Light');
        fAmb.addColor(VIEWER_CONFIG, 'ambientLightColor').onChange(v => ambientLight.color.set(v));
        fAmb.add(VIEWER_CONFIG, 'ambientLightIntensity', 0, 2).onChange(v => ambientLight.intensity = v);

        const fPost = gui.addFolder('Post Processing');
        fPost.add(VIEWER_CONFIG, 'ssaoEnabled').onChange(v => ssaoPass.enabled = v);
        fPost.add(VIEWER_CONFIG, 'ssaoRadius', 0, 64).onChange(v => ssaoPass.kernelRadius = v);
        fPost.add(VIEWER_CONFIG, 'ssaoMinDist', 0.001, 0.1).onChange(v => ssaoPass.minDistance = v);
        fPost.add(VIEWER_CONFIG, 'ssaoMaxDist', 0.1, 10).onChange(v => ssaoPass.maxDistance = v);

        const fExtra = gui.addFolder('Extras');
        fExtra.add(VIEWER_CONFIG, 'roughnessOffset', -1, 1).onChange(v => { if(material.userData.shader) material.userData.shader.uniforms.roughnessOffset.value = v; });
        fExtra.add({ toggleShadow: () => { areShadowsVisible = !areShadowsVisible; if(groundMesh) groundMesh.visible = areShadowsVisible; }}, 'toggleShadow');

        // Orb tweaker — polls for _orbParams (orb script may init after editor)
        let orbTries = 0;
        function tryOrbGui() {
            if (window._orbParams) {
                const fOrb = gui.addFolder('Orb');
                const op = window._orbParams;
                fOrb.add(op, 'lightIntensity', 0, 20000).name('Light intensity');
                fOrb.add(op, 'lightRange', 0, 1000).name('Light range');
                fOrb.add(op, 'glowOpacity', 0, 1).name('Glow opacity');
                fOrb.add(op, 'glowSizeMult', 1, 6).name('Glow size');
                fOrb.add(op, 'flashPeak', 0, 1).name('Flash peak');
            } else if (++orbTries < 10) { setTimeout(tryOrbGui, 300); }
        }
        tryOrbGui();

        // Radar/jammer blink light tweaker
        let blinkTries = 0;
        function tryBlinkGui() {
            if (window._blinkParams) {
                const fBlink = gui.addFolder('Radar / Jammer Light');
                const bp = window._blinkParams;
                fBlink.add(bp, 'intensity', 0, 20000).name('Intensity');
                fBlink.add(bp, 'range', 0, 200).name('Range');
            } else if (++blinkTries < 10) { setTimeout(tryBlinkGui, 300); }
        }
        tryBlinkGui();
    }
</script>
