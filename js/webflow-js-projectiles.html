<script>
window._barProjectilesSetup = function(THREE, opts) {
    var scene = opts.scene, camera = opts.camera, modelScene = opts.modelScene;
    var unitName = opts.unitName, weaponSummary = opts.weaponSummary, renderer = opts.renderer;

    function readColor(el) {
        var dc = el.getAttribute('data-wpn-color');
        if (dc && dc !== '#ffffff' && dc !== 'transparent') return dc;
        var roots = [el], par = el.closest('.uw-item');
        if (par) roots.push(par);
        for (var i = 0; i < roots.length; i++) {
            var dot = roots[i].querySelector('.weapon-color-data,.wpn-color,#wpn-color,[wpn-color]');
            if (dot) {
                var bg = window.getComputedStyle(dot).backgroundColor;
                var m = bg && bg.match(/\d+/g);
                if (m && m.length >= 3)
                    return '#' + ((1<<24)+(parseInt(m[0])<<16)+(parseInt(m[1])<<8)+parseInt(m[2])).toString(16).slice(1);
            }
        }
        return '#ffff00';
    }
    function readAttr(el, a) {
        var v = el.getAttribute(a); if (v) return v;
        var p = el.closest('.uw-item'); if (p) { v = p.getAttribute(a); if (v) return v; }
        var c = el.querySelector('['+a+']'); return c ? c.getAttribute(a) : null;
    }

    var wpnDataBySlug = {};
    document.querySelectorAll('.uw-item-flex[data-wpn-slug]').forEach(function(el) {
        var slug = el.getAttribute('data-wpn-slug'); if (!slug) return;
        wpnDataBySlug[slug] = {
            color: readColor(el), type: readAttr(el,'data-wpn-type')||'Cannon',
            reload: parseFloat(readAttr(el,'data-wpn-reload'))||2,
            damage: parseInt(readAttr(el,'data-wpn-damage'))||100,
            velocity: parseInt(readAttr(el,'data-wpn-velocity'))||500,
            beamtime: parseFloat(readAttr(el,'data-wpn-beamtime'))||0,
            largeBeam: !!(el.querySelector('.weapon-large-beam,#wpn-large-beam-laser') || (el.closest('.uw-item') && el.closest('.uw-item').querySelector('.weapon-large-beam,#wpn-large-beam-laser'))),
            burst: parseInt(readAttr(el,'data-wpn-burst'))||1,
            sound: (function(){var s=el.querySelector('.weapon-sound,#weapon-sound')||(el.closest('.uw-item')&&el.closest('.uw-item').querySelector('.weapon-sound,#weapon-sound'));return s?(s.textContent||s.innerText||'').trim():'';}()),
            accuracy: parseFloat(readAttr(el,'data-wpn-acc'))||0,
            range: parseFloat(readAttr(el,'data-wpn-range'))||400,
            startVelo: parseFloat(readAttr(el,'data-wpn-start-velo'))||0,
            accel: parseFloat(readAttr(el,'data-wpn-accel'))||0
        };
    });
    var wpnDataByNum = {};
    for (var wn in weaponSummary) {
        var def = weaponSummary[wn].def; if (!def) continue;
        var slug = unitName+'-'+def.replace(/_/g,'-');
        if (wpnDataBySlug[slug]) wpnDataByNum[wn] = wpnDataBySlug[slug];
    }

    var firePointNodes = {};
    modelScene.traverse(function(node) {
        var d = node.userData; if (!d) return;
        d = d.extras || d;
        var roles = d.weapon_roles, wpns = d.weapons;
        if (!roles || !wpns || roles.indexOf('fire_point') === -1) return;
        var wl = Array.isArray(wpns) ? wpns : [wpns];
        for (var i = 0; i < wl.length; i++) {
            if (!firePointNodes[wl[i]]) firePointNodes[wl[i]] = [];
            firePointNodes[wl[i]].push(node);
        }
    });
    var defToWnums = {};
    for (var wn in weaponSummary) {
        var def = weaponSummary[wn].def; if (!def) continue;
        if (!defToWnums[def]) defToWnums[def] = [];
        defToWnums[def].push(Number(wn));
    }
    for (var d in defToWnums) defToWnums[d].sort(function(a,b){return a-b;});
    var defFirePoints = {};
    for (var d in defToWnums) {
        defFirePoints[d] = [];
        for (var i = 0; i < defToWnums[d].length; i++) {
            var ns = firePointNodes[defToWnums[d][i]];
            if (ns) for (var j = 0; j < ns.length; j++) defFirePoints[d].push(ns[j]);
        }
    }
    var defFireIndex = {};

    // Shared textures
    function makeRadialTex(w, h) {
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        var cx = c.getContext('2d'), g = cx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
        g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.3,'rgba(255,255,255,0.6)'); g.addColorStop(1,'rgba(255,255,255,0)');
        cx.fillStyle = g; cx.fillRect(0,0,w,h);
        return new THREE.CanvasTexture(c);
    }
    var FT = makeRadialTex(64,64);
    var LT = new THREE.TextureLoader().load('https://cdn.prod.website-files.com/5c68622246b367adf6f3041d/69cb7ec93332ab9d5fadf7c2_flare2.png');
    var sc = document.createElement('canvas'); sc.width=128; sc.height=32;
    var sx = sc.getContext('2d'), sg = sx.createLinearGradient(0,16,128,16);
    sg.addColorStop(0,'rgba(255,255,255,0)'); sg.addColorStop(0.3,'rgba(255,255,255,0.8)');
    sg.addColorStop(0.5,'rgba(255,255,255,1)'); sg.addColorStop(0.7,'rgba(255,255,255,0.8)'); sg.addColorStop(1,'rgba(255,255,255,0)');
    sx.fillStyle=sg; sx.fillRect(0,0,128,32);
    var ST = new THREE.CanvasTexture(sc);

    var ADD = THREE.AdditiveBlending, NORM = THREE.NormalBlending;
    var active = [];
    var audioListener = null, audioBuffers = {};

    function ensureListener() {
        if (!audioListener) { audioListener = new THREE.AudioListener(); camera.add(audioListener); }
    }
    // Pre-cache all weapon sounds
    (function() {
        var urls = {};
        for (var wn in wpnDataByNum) { var s=wpnDataByNum[wn].sound; if (s) urls[s]=1; }
        for (var url in urls) {
            (function(u) {
                new THREE.AudioLoader().load(u, function(b){ ensureListener(); audioBuffers[u]=b; });
            })(url);
        }
    }());

    function playSound(url, pos) {
        if (!url) return;
        ensureListener();
        function _play(buf) {
            var s = new THREE.PositionalAudio(audioListener);
            s.setBuffer(buf); s.setRefDistance(800); s.setVolume(0.4);
            s.position.copy(pos); scene.add(s); s.play();
            s.onEnded = function(){scene.remove(s);};
        }
        if (audioBuffers[url]) { _play(audioBuffers[url]); return; }
        new THREE.AudioLoader().load(url, function(b){ audioBuffers[url]=b; _play(b); });
    }

    var _wp = new THREE.Vector3(), _wd = new THREE.Vector3();
    function getFireOrigin(wnum) {
        var def = weaponSummary[String(wnum)] ? weaponSummary[String(wnum)].def : null;
        var nodes = (def && defFirePoints[def]) ? defFirePoints[def] : (firePointNodes[wnum]||[]);
        if (!nodes || !nodes.length) return null;
        var key = def||wnum, idx = defFireIndex[key]||0;
        var node = nodes[idx % nodes.length];
        defFireIndex[key] = (idx+1) % nodes.length;
        node.updateWorldMatrix(true,false);
        node.getWorldPosition(_wp);
        _wd.set(0,0,1).applyQuaternion(node.getWorldQuaternion(new THREE.Quaternion()));
        if (_wd.lengthSq()<0.01) _wd.set(0,0,1);
        return {pos:_wp.clone(), dir:_wd.clone().normalize(), node:node};
    }
    function refreshNode(node) {
        node.updateWorldMatrix(true,false);
        node.getWorldPosition(_wp);
        _wd.set(0,0,1).applyQuaternion(node.getWorldQuaternion(new THREE.Quaternion()));
        if (_wd.lengthSq()<0.01) _wd.set(0,0,1);
        return {pos:_wp.clone(), dir:_wd.clone().normalize()};
    }

    function getCat(d) {
        var t = (d.type||'').toLowerCase().replace(/[\s-]+/g,'');
        if (t==='beamlaser'||t==='heatray'||t==='tachyonlaserbeam'||t==='thermalordnancegenerator') return 'beam';
        if (t==='lasercannon') return 'laserround';
        if (t==='shotguncannon'||t==='railgun'||t==='sniper'||t==='gatlinggun'||t==='flakcannon') return 'bolt';
        if (t==='plasmacannon'||t==='plasmarepeater'||t==='plasmablast'||t==='plasmashotgun'||t==='clusterplasmacannon'||t==='cannon') return 'plasma';
        if (t==='flamethrower'||t==='flame'||t==='napalmlauncher') return 'flame';
        if (t==='lightningcannon'||t==='lightning'||t==='emp'||t==='triggerexp'||t==='triggeremp'||t==='junosurge') return 'lightning';
        if (t==='dgun'||t==='disintegratorcannon') return 'dgun';
        if (t.indexOf('missile')!==-1||t.indexOf('rocket')!==-1||t.indexOf('torpedo')!==-1||t==='antinuke') return 'rocket';
        if (d.beamtime>0) return 'beam';
        return 'plasma';
    }
    function dScale(dmg) { var d=Math.max(1,Math.min(dmg,5000)); return 0.3+2.7*(Math.log(d)/Math.log(5000)); }
    function spread(dir, acc) {
        if (!acc||acc<=0) return dir.clone();
        var maxDeg = Math.min(15, acc*0.015+Math.log(1+acc)*0.8);
        var rad = maxDeg*Math.PI/180*Math.random(), theta = Math.random()*Math.PI*2;
        var p1 = new THREE.Vector3(); if (Math.abs(dir.x)<0.9) p1.set(1,0,0); else p1.set(0,1,0);
        p1.crossVectors(dir,p1).normalize();
        var p2 = new THREE.Vector3().crossVectors(dir,p1).normalize();
        return dir.clone().multiplyScalar(Math.cos(rad))
            .add(p1.clone().multiplyScalar(Math.sin(rad)*Math.cos(theta)))
            .add(p2.clone().multiplyScalar(Math.sin(rad)*Math.sin(theta))).normalize();
    }

    function spr(color, opacity, tex) {
        return new THREE.SpriteMaterial({map:tex||FT, color:color, transparent:true, opacity:opacity, blending:ADD, depthWrite:false});
    }
    function mkSprite(color, sz, opacity, tex) {
        var s = new THREE.Sprite(spr(color,opacity,tex)); s.scale.set(sz,sz,1); return s;
    }
    function addS(obj, order) { obj.renderOrder=order||998; scene.add(obj); return obj; }

    function muzzleLight(pos, color, intensity, dur) {
        var l = new THREE.PointLight(color, intensity, 80); l.position.copy(pos); scene.add(l);
        active.push({type:'light', age:0, maxAge:dur||0.15, extras:{light:l, si:intensity}});
    }

    function spawnBeam(o, d) {
        var col = new THREE.Color(d.color), sc = dScale(d.damage);
        var len = d.range||200, dur = Math.max(d.beamtime,0.15), thick = (d.largeBeam?2.5:0.8)*sc;
        function cyl(r1, r2, col2, op, order) {
            var g = new THREE.CylinderGeometry(r1,r2,len,8,1,true); g.rotateX(Math.PI/2); g.translate(0,0,len/2);
            var m = new THREE.MeshBasicMaterial({color:col2,transparent:true,opacity:op,blending:ADD,depthWrite:false,side:THREE.DoubleSide});
            var mesh = new THREE.Mesh(g,m); mesh.position.copy(o.pos); mesh.lookAt(o.pos.clone().add(o.dir)); addS(mesh,order); return {mesh,m};
        }
        var bm=d.largeBeam?cyl(thick,thick*0.5,col,0.85,998):cyl(0,thick*1.4,col,0.85,998);
        var bc=d.largeBeam?cyl(thick*0.4,thick*0.12,0xffffff,0.95,999):cyl(0,thick*0.5,0xffffff,0.95,999);
        var fs = thick*24, lf=addS(mkSprite(col,fs*2.2,0.9,LT),999); lf.position.copy(o.pos);
        var endPos=o.pos.clone().add(o.dir.clone().multiplyScalar(len));
        var ef=addS(mkSprite(col,fs*0.6,0.8),999); ef.position.copy(endPos);
        var ef2=addS(mkSprite(col,fs*1.4,0.75,LT),999); ef2.position.copy(endPos);
        muzzleLight(o.pos,col,15*sc,dur);
        active.push({type:'beam',age:0,maxAge:dur,extras:{
            beam:bm.mesh,beamMat:bm.m,beamCore:bc.mesh,coreMat:bc.m,
            laserFlare:lf,laserFlareMat:lf.material,
            endFlare:ef,endFlareMat:ef.material,endLaserFlare:ef2,endLaserFlareMat:ef2.material,
            node:o.node,beamLen:len}});
    }

    function spawnBolt(o, d) {
        var col=new THREE.Color(d.color), sc=dScale(d.damage);
        var spd=Math.max(d.velocity*1.35,270), dir=spread(o.dir,d.accuracy);
        var bl=2*sc, bolt=new THREE.Sprite(new THREE.SpriteMaterial({map:ST,color:col,transparent:true,opacity:0.9,blending:ADD,depthWrite:false}));
        bolt.scale.set(bl*3,bl,1); bolt.position.copy(o.pos); addS(bolt,998);
        var fl=addS(mkSprite(col,sc*12,1),999); fl.position.copy(o.pos);
        muzzleLight(o.pos,col,6*sc,0.12);
        active.push({type:'bolt',age:0,maxAge:(d.range||400)/spd,velocity:dir.multiplyScalar(spd),
            extras:{bolt,boltMat:bolt.material,flare:fl,flareMat:fl.material}});
    }

    function spawnLaserRound(o, d) {
        var col=new THREE.Color(d.color), sc=dScale(d.damage);
        var spd=Math.max(d.velocity*1.35,270), dir=spread(o.dir,d.accuracy);
        var len=Math.max(8,sc*12), thick=Math.max(0.5,sc*0.9);
        function cyl(r1,r2,col2,op,order) {
            var g=new THREE.CylinderGeometry(r1,r2,len,6,1,true); g.rotateX(Math.PI/2);
            var m=new THREE.MeshBasicMaterial({color:col2,transparent:true,opacity:op,blending:ADD,depthWrite:false,side:THREE.DoubleSide});
            var mesh=new THREE.Mesh(g,m); mesh.position.copy(o.pos); mesh.lookAt(o.pos.clone().add(dir)); addS(mesh,order); return {mesh,m};
        }
        var rm=cyl(thick,thick*0.6,col,0.85,998), rc=cyl(thick*0.35,thick*0.2,0xffffff,0.95,999);
        var fl=addS(mkSprite(col,sc*14,1),999); fl.position.copy(o.pos);
        var lf=addS(mkSprite(col,sc*28,0.85,LT),999); lf.position.copy(o.pos);
        muzzleLight(o.pos,col,8*sc,0.1);
        active.push({type:'laserround',age:0,maxAge:(d.range||400)/spd,velocity:dir.clone().multiplyScalar(spd),
            extras:{round:rm.mesh,roundMat:rm.m,core:rc.mesh,coreMat:rc.m,flare:fl,flareMat:fl.material,laserFlare:lf,laserFlareMat:lf.material,dir}});
    }

    function spawnPlasma(o, d) {
        var col=new THREE.Color(d.color), sc=dScale(d.damage), bs=Math.max(0.4,sc*0.6);
        var spd=Math.max(d.velocity*1.08,180), dir=spread(o.dir,d.accuracy);
        var ball=addS(mkSprite(col,bs*3,0.95),998); ball.position.copy(o.pos);
        var core=addS(mkSprite(0xffffff,bs*1.5,0.7),999); core.position.copy(o.pos);
        var flash=addS(mkSprite(0xffffcc,bs*15,1),999); flash.position.copy(o.pos);
        muzzleLight(o.pos,0xffffcc,12*sc,0.1);
        active.push({type:'plasma',age:0,maxAge:(d.range||400)/spd,velocity:dir.multiplyScalar(spd),gravity:-15,
            extras:{ball,ballMat:ball.material,core,coreMat:core.material,flash,flashMat:flash.material}});
    }

    function spawnRocket(o, d) {
        var col=new THREE.Color(d.color), sc=dScale(d.damage);
        var maxSpd=Math.max(d.velocity*0.9,135), dir=spread(o.dir,d.accuracy), rl=1.5*sc;
        var initSpd=(d.accel>0)?Math.min(d.startVelo,maxSpd):maxSpd;
        var g=new THREE.Group();
        var bg=new THREE.CylinderGeometry(rl*0.15,rl*0.15,rl,6); bg.rotateX(Math.PI/2);
        var bm=new THREE.MeshBasicMaterial({color:0x888888}); g.add(new THREE.Mesh(bg,bm));
        var ng=new THREE.ConeGeometry(rl*0.18,rl*0.5,6); ng.rotateX(Math.PI/2); ng.translate(0,0,rl*0.75);
        var nm=new THREE.MeshBasicMaterial({color:col}); g.add(new THREE.Mesh(ng,nm));
        var exh=new THREE.Sprite(spr(0xff8800,0.8)); exh.scale.set(rl*2,rl*2,1); exh.position.set(0,0,-rl*0.6); g.add(exh);
        g.position.copy(o.pos); g.lookAt(o.pos.clone().add(dir)); addS(g,998);
        muzzleLight(o.pos,0xff6600,9*sc,0.15);
        var dirUnit=dir.clone().normalize();
        active.push({type:'rocket',age:0,maxAge:(d.range||400)/maxSpd,velocity:dirUnit.clone().multiplyScalar(initSpd),
            extras:{group:g,exhMat:exh.material,bodyMat:bm,noseMat:nm,rl,accel:d.accel||0,maxSpd,dir:dirUnit}});
    }

    function spawnFlame(o, d) {
        var sc=dScale(d.damage), spd=Math.max(d.velocity*0.54,90), count=18;
        var sa=0.5+(d.accuracy||0)*0.002;
        muzzleLight(o.pos,0xff6600,12*sc,0.2);
        for (var i=0; i<count; i++) {
            var t=i/count, fc=new THREE.Color().setHSL(0.08-t*0.06,1,0.7-t*0.3);
            var p=new THREE.Sprite(spr(fc,0.9)); var sz=(0.4+t*1.5)*sc; p.scale.set(sz,sz,1);
            p.position.copy(o.pos); addS(p,998);
            var sv=new THREE.Vector3((Math.random()-0.5)*sa,(Math.random()-0.5)*sa,(Math.random()-0.5)*sa);
            var vel=o.dir.clone().multiplyScalar(spd*(0.5+Math.random()*0.9)).add(sv);
            active.push({type:'flame',age:-i*0.018,maxAge:0.4+Math.random()*0.3,velocity:vel,extras:{sprite:p,mat:p.material}});
        }
    }

    function spawnLightning(o, d) {
        var col=new THREE.Color(d.color), sc=dScale(d.damage);
        var len=60+d.velocity*0.06, dur=Math.max(d.beamtime,0.15), seg=12;
        var pts=[], pos=o.pos.clone(), step=o.dir.clone().multiplyScalar(len/seg);
        for (var i=0; i<=seg; i++) {
            var jt=i===0||i===seg?0:(Math.random()-0.5)*sc*3;
            pts.push(new THREE.Vector3(pos.x+jt,pos.y+(i===0||i===seg?0:(Math.random()-0.5)*sc*3),pos.z+jt));
            pos.add(step);
        }
        var geom=new THREE.BufferGeometry().setFromPoints(pts);
        var lm=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:1,blending:ADD,depthWrite:false});
        var cm=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.8,blending:ADD,depthWrite:false});
        var line=new THREE.Line(geom,lm); addS(line,998);
        var core=new THREE.Line(geom.clone(),cm); addS(core,999);
        var fl=addS(mkSprite(col,sc*15,1),999); fl.position.copy(o.pos);
        muzzleLight(o.pos,col,15*sc,dur);
        active.push({type:'lightning',age:0,maxAge:dur,extras:{
            line,lineMat:lm,coreLine:core,coreLineMat:cm,flare:fl,flareMat:fl.material,
            geom,coreGeom:core.geometry,pts,scale:sc,origin:o,node:o.node,seg,len}});
    }

    function spawnDgun(o, d) {
        var col=new THREE.Color(d.color||'#b24cff'), spd=Math.max(d.velocity*0.72,180);
        var sg=new THREE.SphereGeometry(1,12,8);
        var sm=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.9,blending:ADD,depthWrite:false,side:THREE.DoubleSide});
        var sphere=new THREE.Mesh(sg,sm); sphere.position.copy(o.pos); addS(sphere,998);
        var glow=addS(mkSprite(col,8,0.8),999); glow.position.copy(o.pos);
        muzzleLight(o.pos,col,24,0.3);
        active.push({type:'dgun',age:0,maxAge:1.8,velocity:o.dir.clone().multiplyScalar(spd),
            extras:{sphere,sphereMat:sm,glow,glowMat:glow.material}});
    }

    function spawnSmoke(pos) {
        var p=new THREE.Sprite(new THREE.SpriteMaterial({map:FT,color:0x888888,transparent:true,opacity:0.3,blending:NORM,depthWrite:false}));
        p.scale.set(1.5,1.5,1); p.position.copy(pos); addS(p,997);
        active.push({type:'smoke',age:0,maxAge:0.8,velocity:new THREE.Vector3((Math.random()-0.5)*2,Math.random()*3,(Math.random()-0.5)*2),extras:{sprite:p,mat:p.material}});
    }

    function update(dt) {
        for (var i=active.length-1; i>=0; i--) {
            var p=active[i]; p.age+=dt;
            if (p.age>p.maxAge) { remove(p); active.splice(i,1); continue; }
            if (p.age<0) continue;
            var t=p.age/p.maxAge, ex=p.extras;
            switch(p.type) {
                case 'beam':
                    if (ex.node) {
                        var cur=refreshNode(ex.node);
                        ex.beam.position.copy(cur.pos); ex.beam.lookAt(cur.pos.clone().add(cur.dir));
                        ex.beamCore.position.copy(cur.pos); ex.beamCore.lookAt(cur.pos.clone().add(cur.dir));
                        ex.laserFlare.position.copy(cur.pos);
                        var ep2=cur.pos.clone().add(cur.dir.clone().multiplyScalar(ex.beamLen));
                        ex.endFlare.position.copy(ep2); ex.endLaserFlare.position.copy(ep2);
                    }
                    var bf=Math.max(0,1-Math.max(0,t-0.8)/0.2);
                    ex.beamMat.opacity=0.85*bf; ex.coreMat.opacity=0.95*bf;
                    ex.endFlareMat.opacity=0.8*bf;
                    ex.laserFlareMat.opacity=0.9*bf; ex.endLaserFlareMat.opacity=0.75*bf; break;
                case 'bolt':
                    if (p.velocity) ex.bolt.position.addScaledVector(p.velocity,dt);
                    ex.boltMat.opacity=0.9*(1-t); ex.flareMat.opacity=Math.max(0,1-t*5); ex.flare.scale.multiplyScalar(0.92); break;
                case 'laserround':
                    if (p.velocity) {
                        ex.round.position.addScaledVector(p.velocity,dt); ex.round.lookAt(ex.round.position.clone().add(ex.dir));
                        ex.core.position.copy(ex.round.position); ex.core.lookAt(ex.core.position.clone().add(ex.dir));
                        ex.laserFlare.position.copy(ex.round.position);
                    }
                    ex.roundMat.opacity=0.85*(1-t*0.5); ex.coreMat.opacity=0.95*(1-t*0.5);
                    ex.flareMat.opacity=Math.max(0,1-t*6); ex.flare.scale.multiplyScalar(0.9);
                    ex.laserFlareMat.opacity=0.85*(1-t*0.4); break;
                case 'plasma':
                    if (p.velocity) { ex.ball.position.addScaledVector(p.velocity,dt); ex.core.position.copy(ex.ball.position); if (p.gravity) p.velocity.y+=p.gravity*dt; }
                    ex.ballMat.opacity=0.95*(1-t*0.7); ex.coreMat.opacity=0.7*(1-t);
                    ex.flashMat.opacity=Math.max(0,1-t*8); ex.flash.scale.multiplyScalar(0.88); break;
                case 'rocket':
                    if (p.velocity) {
                        if (ex.accel>0) {
                            var spd=p.velocity.length();
                            if (spd<ex.maxSpd) { spd=Math.min(spd+ex.accel*dt,ex.maxSpd); p.velocity.copy(ex.dir).multiplyScalar(spd); }
                        }
                        ex.group.position.addScaledVector(p.velocity,dt);
                    }
                    if (Math.random()<dt*12) spawnSmoke(ex.group.position.clone());
                    ex.exhMat.opacity=0.5+Math.random()*0.4; break;
                case 'flame':
                    if (p.velocity) { ex.sprite.position.addScaledVector(p.velocity,dt); p.velocity.y+=8*dt; }
                    ex.mat.opacity=0.9*(1-t*t); ex.sprite.scale.multiplyScalar(1+dt*6); break;
                case 'lightning':
                    var lo=ex.origin; if (ex.node) { lo=refreshNode(ex.node); ex.flare.position.copy(lo.pos); }
                    if (Math.random()<dt*20) {
                        var step2=lo.dir.clone().multiplyScalar(ex.len/ex.seg), lp=lo.pos.clone();
                        for (var j=0;j<=ex.seg;j++) {
                            var jt=j===0||j===ex.seg?0:(Math.random()-0.5)*ex.scale*3;
                            ex.pts[j].set(lp.x+jt,lp.y+(j===0||j===ex.seg?0:(Math.random()-0.5)*ex.scale*3),lp.z+jt);
                            lp.add(step2);
                        }
                        ex.geom.setFromPoints(ex.pts); ex.coreGeom.setFromPoints(ex.pts);
                    }
                    ex.lineMat.opacity=1-t*t; ex.coreLineMat.opacity=0.8*(1-t); ex.flareMat.opacity=1-t; break;
                case 'dgun':
                    if (p.velocity) { ex.sphere.position.addScaledVector(p.velocity,dt); ex.glow.position.copy(ex.sphere.position); }
                    var ds=2+p.age*6; ex.sphere.scale.set(ds,ds,ds); ex.sphereMat.opacity=0.9*(1-t);
                    ex.glow.scale.set(ds*2.5,ds*2.5,1); ex.glowMat.opacity=0.8*(1-t); break;
                case 'smoke':
                    if (p.velocity) ex.sprite.position.addScaledVector(p.velocity,dt);
                    ex.mat.opacity=0.3*(1-t); ex.sprite.scale.multiplyScalar(1+dt*3); break;
                case 'light':
                    ex.light.intensity=ex.si*(1-t); break;
            }
        }
    }

    function remove(p) {
        var ex=p.extras;
        function rm() { for (var i=0;i<arguments.length;i++) scene.remove(arguments[i]); }
        function dis() { for (var i=0;i<arguments.length;i++) if (arguments[i]) arguments[i].dispose(); }
        switch(p.type) {
            case 'beam': rm(ex.beam,ex.beamCore,ex.laserFlare,ex.endFlare,ex.endLaserFlare); dis(ex.beam.geometry,ex.beamMat,ex.beamCore.geometry,ex.coreMat,ex.laserFlareMat,ex.endFlareMat,ex.endLaserFlareMat); break;
            case 'bolt': rm(ex.bolt,ex.flare); dis(ex.boltMat,ex.flareMat); break;
            case 'laserround': rm(ex.round,ex.core,ex.flare,ex.laserFlare); dis(ex.round.geometry,ex.roundMat,ex.core.geometry,ex.coreMat,ex.flareMat,ex.laserFlareMat); break;
            case 'plasma': rm(ex.ball,ex.core,ex.flash); dis(ex.ballMat,ex.coreMat,ex.flashMat); break;
            case 'rocket': rm(ex.group); dis(ex.bodyMat,ex.noseMat,ex.exhMat); ex.group.traverse(function(c){if(c.geometry)c.geometry.dispose();}); break;
            case 'flame': rm(ex.sprite); dis(ex.mat); break;
            case 'lightning': rm(ex.line,ex.coreLine,ex.flare); dis(ex.geom,ex.lineMat,ex.coreLineMat,ex.flareMat); break;
            case 'dgun': rm(ex.sphere,ex.glow); dis(ex.sphere.geometry,ex.sphereMat,ex.glowMat); break;
            case 'smoke': rm(ex.sprite); dis(ex.mat); break;
            case 'light': rm(ex.light); ex.light.dispose(); break;
        }
    }

    function fireWeapon(wnum) {
        var data=wpnDataByNum[String(wnum)]; if (!data) return;
        var o=getFireOrigin(wnum); if (!o) return;
        if (data.sound) playSound(data.sound,o.pos);
        var fn = {beam:spawnBeam,laserround:spawnLaserRound,bolt:spawnBolt,plasma:spawnPlasma,rocket:spawnRocket,flame:spawnFlame,lightning:spawnLightning,dgun:spawnDgun};
        (fn[getCat(data)]||spawnPlasma)(o,data);
    }

    return {fireWeapon, update, wpnDataByNum};
};
</script>
