<script>
window._barProjectilesUpdate = function(ctx) {
    var THREE = ctx.THREE, scene = ctx.scene, mainScene = ctx.mainScene, modelScene = ctx.modelScene;
    var active = ctx.active, weaponSummary = ctx.weaponSummary, wpnDataByNum = ctx.wpnDataByNum;
    var getCat = ctx.getCat, dScale = ctx.dScale, rScale = ctx.rScale;
    var refreshNode = ctx.refreshNode, getFireOrigin = ctx.getFireOrigin, playSound = ctx.playSound;
    var spawnSmoke = ctx.spawnSmoke, spawnBubble = ctx.spawnBubble;
    var spawnBeam = ctx.spawnBeam, spawnBolt = ctx.spawnBolt, spawnLaserRound = ctx.spawnLaserRound;
    var spawnPlasma = ctx.spawnPlasma, spawnRocket = ctx.spawnRocket, spawnFlame = ctx.spawnFlame;
    var spawnLightning = ctx.spawnLightning, spawnDgun = ctx.spawnDgun, spawnTorpedo = ctx.spawnTorpedo;
    var spawnBomb = ctx.spawnBomb, spawnStarburst = ctx.spawnStarburst;
    var updateBoltTube = ctx.updateBoltTube;
    var isToggleOpen = ctx.isToggleOpen || function() { return true; };

    // Shader-based muzzle flash: boost highlightStrength on all model meshes.
    // This bypasses the metalness problem — works regardless of PBR settings.
    var _flashLevel = 0, _flashAge = 0, _flashHold = 0, _flashFade = 0.5, _flashStr = 0;
    function flashModel(strength, hold) {
        _flashStr = Math.max(_flashStr, strength);
        _flashHold = Math.max(_flashHold, hold || 0);
        _flashAge = 0; _flashLevel = _flashStr;
    }

    function update(dt) {
        // Decay and apply model flash highlight
        if (_flashLevel > 0) {
            _flashAge += dt;
            if (_flashAge <= _flashHold) { _flashLevel = _flashStr; }
            else { _flashLevel = Math.max(0, _flashStr * (1 - (_flashAge - _flashHold) / _flashFade)); }
            modelScene.traverse(function(c) {
                if (c.isMesh && c.userData) c.userData._highlightVal = Math.max(c.userData._highlightVal || 0, _flashLevel);
            });
            if (_flashLevel <= 0) { _flashStr = 0; _flashHold = 0; }
        }
        for (var i=active.length-1; i>=0; i--) {
            var p=active[i]; p.age+=dt;
            if (p.age>p.maxAge) { remove(p); active.splice(i,1); continue; }
            if (p.age<0) continue;
            var t=p.age/p.maxAge, ex=p.extras;
            switch(p.type) {
                case 'beam':
                    if (ex.node) {
                        var cur=refreshNode(ex.node);
                        ex.beam.position.copy(cur.pos); ex.beam.lookAt(cur.pos.clone().add(cur.dir));
                        ex.beamCore.position.copy(cur.pos); ex.beamCore.lookAt(cur.pos.clone().add(cur.dir));
                        ex.laserFlare.position.copy(cur.pos);
                        var ep2=cur.pos.clone().add(cur.dir.clone().multiplyScalar(ex.beamLen));
                        ex.endFlare.position.copy(ep2); ex.endLaserFlare.position.copy(ep2);
                    }
                    var bt=p.age/ex.beamDur, bf=bt<0.8?1:Math.max(0,1-(bt-0.8)/0.2);
                    ex.beamMat.opacity=0.85*bf; ex.coreMat.opacity=0.95*bf;
                    ex.endFlareMat.opacity=0.8*bf;
                    ex.laserFlareMat.opacity=0.9*bf; ex.endLaserFlareMat.opacity=0.75*bf;
                    if(ex.light){var la=p.age-ex.beamDur; ex.light.intensity=la<0?ex.lightSi:ex.lightSi*Math.max(0,1-la/0.5);} break;
                case 'bolt':
                    if (p.velocity) ex.bolt.position.addScaledVector(p.velocity,dt);
                    ex.boltMat.opacity=0.9*(1-t); ex.flareMat.opacity=Math.max(0,1-t*5); ex.flare.scale.multiplyScalar(0.92);
                    if (ex.trail) { ex.trail.position.copy(ex.bolt.position); ex.trail.lookAt(ex.bolt.position.clone().add(ex.dir)); var tg=Math.min(1,p.age*10); ex.trail.scale.set(1,1,tg*(1+t*4)); ex.trailMat.opacity=0.35*(1-t); } break;
                case 'laserround':
                    if (p.velocity) {
                        ex.round.position.addScaledVector(p.velocity,dt); ex.round.lookAt(ex.round.position.clone().add(ex.dir));
                        ex.core.position.copy(ex.round.position); ex.core.lookAt(ex.core.position.clone().add(ex.dir));
                        ex.laserFlare.position.copy(ex.round.position);
                    }
                    ex.roundMat.opacity=0.85*(1-t*0.5); ex.coreMat.opacity=0.95*(1-t*0.5);
                    ex.flareMat.opacity=Math.max(0,1-t*6); ex.flare.scale.multiplyScalar(0.9);
                    ex.laserFlareMat.opacity=0.85*(1-t*0.4);
                    if (ex.trail) { ex.trail.position.copy(ex.round.position); ex.trail.lookAt(ex.round.position.clone().add(ex.dir)); var tg=Math.min(1,p.age*10); ex.trail.scale.set(1,1,tg*(1+t*4)); ex.trailMat.opacity=0.35*(1-t); } break;
                case 'plasma':
                    if (p.velocity) { ex.ball.position.addScaledVector(p.velocity,dt); ex.core.position.copy(ex.ball.position); if (p.gravity) p.velocity.y+=p.gravity*dt; }
                    ex.ballMat.opacity=0.95*(1-t*0.7); ex.coreMat.opacity=0.7*(1-t);
                    var mfo=Math.max(0,1-p.age/0.18);
                    ex.flashMat.opacity=mfo; ex.flashMat2.opacity=mfo*0.7; ex.flashMat3.opacity=mfo*0.9;
                    var mfa=Math.min(p.age/0.18,1), sg=1+mfa*0.4; ex.flash.scale.set(sg,0.575*sg,sg); ex.flash2.scale.set(sg,0.575*sg,sg);
                    var fg=1-mfa*0.5; ex.flash3.scale.set(fg,fg,fg);
                    if (ex.trail) { ex.trail.position.copy(ex.ball.position); ex.trail.lookAt(ex.ball.position.clone().add(ex.dir)); var tg=Math.min(1,p.age*10); ex.trail.scale.set(1,1,tg*(1+t*4)); ex.trailMat.opacity=0.35*(1-t); } break;
                case 'rocket':
                    if (p.velocity) {
                        if (ex.isAA) { p.velocity.y+=150*dt; ex.dir.copy(p.velocity).normalize(); }
                        if (ex.accel>0) {
                            var spd=p.velocity.length();
                            if (spd<ex.maxSpd) { spd=Math.min(spd+ex.accel*dt,ex.maxSpd); p.velocity.copy(ex.dir).multiplyScalar(spd); }
                        }
                        ex.group.position.addScaledVector(p.velocity,dt);
                        ex.group.lookAt(ex.group.position.clone().add(p.velocity));
                        p.dist+=p.velocity.length()*dt;
                        if (p.dist>=p.range) { p.age=p.maxAge; }
                    }
                    if (!ex.isAA && Math.random()<dt*32) spawnSmoke(ex.group.position.clone());
                    if (ex.trail) { ex.trail.position.copy(ex.group.position); ex.trail.lookAt(ex.group.position.clone().add(ex.dir)); var tg=Math.min(1,p.age*4); ex.trail.scale.set(1,1,tg*(1+t*2)); ex.trailMat.opacity=0.55*(1-t); }
                    ex.exhMat.opacity=0.5+Math.random()*0.4; break;
                case 'flame':
                    if (p.velocity) { p.velocity.multiplyScalar(1-dt*1.2); ex.sprite.position.addScaledVector(p.velocity,dt); p.velocity.y+=8*dt; }
                    var fgEnd=ex.noBoost?3.6:ex.isTex?4.1:5.5, fg=t<0.8?3.6:fgEnd, bop=ex.baseOp||0.9, fo=t<0.8?bop*(1-t*t):bop*(1-t*t)*(1-(t-0.8)/0.2);
                    ex.mat.opacity=fo; ex.sprite.scale.multiplyScalar(1+dt*fg);
                    if (ex.rotSpd) ex.mat.rotation+=ex.rotSpd*dt; break;
                case 'lightning':
                    var lo=ex.origin; if (ex.node) { lo=refreshNode(ex.node); ex.flare.position.copy(lo.pos); }
                    if (Math.random()<dt*20) {
                        for (var bi=0;bi<ex.bolts.length;bi++) {
                            var b=ex.bolts[bi], step2=lo.dir.clone().multiplyScalar(ex.len/ex.seg), lp=lo.pos.clone();
                            for (var j=0;j<=ex.seg;j++) {
                                var jt=j===0||j===ex.seg?0:(Math.random()-0.5)*ex.jitter;
                                b.pts[j].set(lp.x+jt,lp.y+(j===0||j===ex.seg?0:(Math.random()-0.5)*ex.jitter),lp.z+jt);
                                lp.add(step2);
                            }
                            updateBoltTube(b.tubeG,b.pts,ex.tubeR,ex.radS);
                            updateBoltTube(b.coreG,b.pts,ex.tubeR*0.25,ex.radS);
                        }
                    }
                    for (var bi2=0;bi2<ex.bolts.length;bi2++) { ex.bolts[bi2].tubeMat.opacity=0.85*(1-t*t); ex.bolts[bi2].coreMat.opacity=0.95*(1-t); }
                    ex.flareMat.opacity=1-t;
                    if (ex.endFlare) { ex.endFlare.position.copy(ex.bolts[0].pts[ex.seg]); ex.endFlareMat.opacity=0.8*(1-t); } break;
                case 'dgun':
                    if (p.velocity) { ex.sphere.position.addScaledVector(p.velocity,dt); ex.glow.position.copy(ex.sphere.position); ex.flare.position.copy(ex.sphere.position); }
                    var ds=2+p.age*6; ex.sphere.scale.set(ds,ds,ds); ex.sphereMat.opacity=0.9*(1-t);
                    ex.glow.scale.set(ds*2.5,ds*2.5,1); ex.glowMat.opacity=0.8*(1-t);
                    var fs=ds*10.5*(1+0.15*Math.sin(p.age*18)); ex.flare.scale.set(fs,fs,1); ex.flareMat.opacity=0.9*(1-t*t); break;
                case 'smoke':
                    if (p.velocity) ex.sprite.position.addScaledVector(p.velocity,dt);
                    ex.mat.opacity=ex.sop*(1-t); ex.sprite.scale.multiplyScalar(1+dt*0.95);
                    ex.mat.rotation+=ex.rotSpd*dt; break;
                case 'torpedo':
                    if (p.velocity) {
                        if (ex.airDrop && p.age<ex.dropTime) {
                            // Dropping phase: gravity pulls down, no forward thrust
                            p.velocity.y-=180*dt;
                            ex.group.position.addScaledVector(p.velocity,dt);
                            ex.group.lookAt(ex.group.position.clone().add(p.velocity));
                            ex.exhMat.opacity=0; // engine off during drop
                        } else {
                            if (ex.airDrop && !ex._activated) {
                                // Activate: set velocity to forward direction at initial speed
                                ex._activated=true;
                                p.velocity.copy(ex.dir).multiplyScalar(ex.maxSpd*0.5);
                                p.velocity.y=0;
                            }
                            if (ex.accel>0) {
                                var tspd=p.velocity.length();
                                if (tspd<ex.maxSpd) { tspd=Math.min(tspd+ex.accel*dt,ex.maxSpd); p.velocity.copy(ex.dir).multiplyScalar(tspd); }
                            }
                            ex.group.position.addScaledVector(p.velocity,dt);
                            ex.group.lookAt(ex.group.position.clone().add(p.velocity));
                            p.dist+=p.velocity.length()*dt;
                            if (p.dist>=p.range) { p.age=p.maxAge; }
                            ex.exhMat.opacity=0.4+Math.random()*0.3;
                        }
                    }
                    if (!ex.airDrop && Math.random()<dt*15) spawnBubble(ex.group.position.clone());
                    break;
                case 'bomb':
                    if (p.velocity) {
                        p.velocity.y-=180*dt; // gravity
                        ex.group.position.addScaledVector(p.velocity,dt);
                        ex.group.lookAt(ex.group.position.clone().add(p.velocity));
                    }
                    if (ex.group.position.y<-200) p.age=p.maxAge; break;
                case 'bubble':
                    if (p.velocity) { ex.sprite.position.addScaledVector(p.velocity,dt); p.velocity.y+=2*dt; }
                    ex.mat.opacity=0.5*(1-t); var bs2=ex.sz*(1+t*0.6); ex.sprite.scale.set(bs2,bs2,1); break;
                case 'mflash':
                    var mft=Math.min(1,t*3); // quick fade over first third, then hold
                    ex.flareMat.opacity=Math.max(0,1-mft*mft); ex.lflareMat.opacity=Math.max(0,0.85*(1-mft));
                    var mfg=(1+t*0.5)*ex.initSize; ex.flare.scale.set(mfg,mfg,1);
                    ex.lflare.scale.set(mfg*1.8,mfg*1.8,1); break;
                case 'light':
                    ex.light.intensity=ex.si*(1-t); break;
            }
        }
    }

    function remove(p) {
        var ex=p.extras;
        function rm() { for (var i=0;i<arguments.length;i++) scene.remove(arguments[i]); }
        function dis() { for (var i=0;i<arguments.length;i++) if (arguments[i]) arguments[i].dispose(); }
        switch(p.type) {
            case 'beam': rm(ex.beam,ex.beamCore,ex.laserFlare,ex.endFlare,ex.endLaserFlare); if(ex.light){mainScene.remove(ex.light);ex.light.dispose();} dis(ex.beam.geometry,ex.beamMat,ex.beamCore.geometry,ex.coreMat,ex.laserFlareMat,ex.endFlareMat,ex.endLaserFlareMat); break;
            case 'bolt': rm(ex.bolt,ex.flare); if(ex.trail){rm(ex.trail);dis(ex.trail.geometry,ex.trailMat);} dis(ex.boltMat,ex.flareMat); break;
            case 'laserround': rm(ex.round,ex.core,ex.flare,ex.laserFlare); if(ex.trail){rm(ex.trail);dis(ex.trail.geometry,ex.trailMat);} dis(ex.round.geometry,ex.roundMat,ex.core.geometry,ex.coreMat,ex.flareMat,ex.laserFlareMat); break;
            case 'plasma': rm(ex.ball,ex.core,ex.flash,ex.flash2,ex.flash3); if(ex.trail){rm(ex.trail);dis(ex.trail.geometry,ex.trailMat);} dis(ex.ballMat,ex.coreMat,ex.flashMat,ex.flashMat2,ex.flashMat3,ex.flash.geometry,ex.flash2.geometry,ex.flash3.geometry); break;
            case 'rocket': rm(ex.group); if(ex.trail){rm(ex.trail);dis(ex.trail.geometry,ex.trailMat);} dis(ex.bodyMat,ex.noseMat,ex.exhMat); ex.group.traverse(function(c){if(c.geometry)c.geometry.dispose();}); break;
            case 'flame': rm(ex.sprite); dis(ex.mat); break;
            case 'lightning': for(var bi=0;bi<ex.bolts.length;bi++){var b=ex.bolts[bi];rm(b.tube,b.core);dis(b.tubeG,b.tubeMat,b.coreG,b.coreMat);} rm(ex.flare); if(ex.endFlare){rm(ex.endFlare);dis(ex.endFlareMat);} dis(ex.flareMat); break;
            case 'dgun': rm(ex.sphere,ex.glow,ex.flare); dis(ex.sphere.geometry,ex.sphereMat,ex.glowMat,ex.flareMat); break;
            case 'smoke': rm(ex.sprite); dis(ex.mat); break;
            case 'torpedo': rm(ex.group); dis(ex.bodyMat,ex.noseMat,ex.exhMat); ex.group.traverse(function(c){if(c.geometry)c.geometry.dispose();}); break;
            case 'bomb': rm(ex.group); dis(ex.bodyMat,ex.noseMat,ex.finMat); ex.group.traverse(function(c){if(c.geometry)c.geometry.dispose();}); break;
            case 'bubble': rm(ex.sprite); dis(ex.mat); break;
            case 'mflash': rm(ex.flare,ex.lflare); dis(ex.flareMat,ex.lflareMat); break;
            case 'light': mainScene.remove(ex.light); ex.light.dispose(); break;
        }
    }


    var _spawnFns = {beam:spawnBeam,laserround:spawnLaserRound,bolt:spawnBolt,plasma:spawnPlasma,rocket:spawnRocket,torpedo:spawnTorpedo,starburst:spawnStarburst,flame:spawnFlame,lightning:spawnLightning,dgun:spawnDgun,bomb:spawnBomb};

    function _fireSingle(wnum, data, burstIdx) {
        var o=getFireOrigin(wnum); if (!o) return;
        var cat = getCat(data);
        if (data.sound) { var _pitch = cat==='beam' ? (data.largeBeam ? 0.96+Math.random()*0.08 : 1) : 0.93+Math.random()*0.14; playSound(data.sound,o.pos,true,_pitch); }
        var _fn=((data.name||'')+'|'+(data.type||'')).toLowerCase(); data._isFlak=_fn.indexOf('flak')!==-1; data._isAA=!!data.isAA;
        var hold = cat === 'beam' ? Math.min(Math.max(data.beamtime, 0.15), 0.3) : cat === 'flame' ? 0.2 : cat === 'lightning' ? Math.min(Math.max(data.beamtime, 0.15), 0.3) : 0.05;
        flashModel(Math.min(dScale(data.damage) * rScale(data.range) * 0.15, 0.25), hold);
        var spawnFn = _spawnFns[cat]||spawnPlasma;
        var count = data.projectiles||1;
        if (count <= 1) { spawnFn(o, data); }
        else {
            var baseAcc = Math.max(data.accuracy, 300);
            for (var pi = 0; pi < count; pi++) {
                var shotData = {}; for (var k in data) shotData[k] = data[k];
                shotData.accuracy = baseAcc + (Math.random()-0.5) * baseAcc * 0.5;
                spawnFn(o, shotData);
            }
        }
    }

    var _burstTimers = {};
    function fireWeapon(wnum) {
        if (!isToggleOpen()) return;
        var data=wpnDataByNum[String(wnum)]; if (!data) return;
        var cat = getCat(data);
        var burst = (cat==='flame'||cat==='lightning') ? 1 : (data.burst||1);
        if (burst <= 1) { _fireSingle(wnum, data, 0); return; }
        // Cancel any running burst for this weapon def (prevents overlap)
        var def = weaponSummary[String(wnum)] ? weaponSummary[String(wnum)].def : ('w'+wnum);
        if (_burstTimers[def]) { _burstTimers[def].forEach(function(t){clearTimeout(t);}); }
        _burstTimers[def] = [];
        var rate = (data.burstrate||0.1) * 1000; // ms between shots
        for (var i = 0; i < burst; i++) {
            (function(idx) {
                var tid = setTimeout(function() { _fireSingle(wnum, data, idx); }, idx * rate);
                _burstTimers[def].push(tid);
            })(i);
        }
    }

    return {fireWeapon: fireWeapon, update: update, wpnDataByNum: wpnDataByNum};
};
</script>
