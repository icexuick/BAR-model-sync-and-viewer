<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { SSAOPass } from 'three/addons/postprocessing/SSAOPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
    import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';


    const VIEWER_CONFIG = {
        autoRotationSpeed: 0.22,
        mouseRotateSpeed: 0.5,
        envMapIntensity: 1.05,
        hdrUrl: '',
        toneMappingExposure: 1.5,
        roughnessOffset: 0.0,
        teamColor: '#0043EE',

        keyLightIntensity: 0.7,
        keyLightColor: '#ffffff',
        keyLightX: 3, keyLightY: 6, keyLightZ: 2,
        shadowRadius: 4,
        shadowBlurSamples: 12,
        fillLightIntensity: 0.1,
        fillLightColor: '#ffffff',
        fillLightX: -3, fillLightY: 2, fillLightZ: -4,
        ambientLightIntensity: 0.02,
        ambientLightColor: '#ffffff',

        ssaoEnabled: true,
        ssaoRadius: 16,
        ssaoMinDist: 0.001,
        ssaoMaxDist: 5.5,
        exportWidth: 4096,
        initialZoomMultiplier: 0.72,
        cameraHeightFactor: 0.8,
        zoomReferenceRadius: 18,
        zoomExponent: 0.72,
        zoomExponentFactories: 0.85
    };
    function isMobileDevice() {
        const ua = navigator.userAgent.toLowerCase();
        return /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/.test(ua) ||
               ('maxTouchPoints' in navigator && navigator.maxTouchPoints > 0 && window.innerWidth < 768);
    }
    const isMobile = isMobileDevice();
    const performanceSettings = {
        pixelRatioCap: isMobile ? Math.min(window.devicePixelRatio, 2.0) : window.devicePixelRatio,
        shadowMapSize: isMobile ? 512 : 1024,
        shadowMapType: THREE.VSMShadowMap,
        anisotropy: isMobile ? 2 : 4,
        ssaoKernelSize: isMobile ? 6 : 8,
        ssaoKernelRadius: isMobile ? 8 : 16,
        ssaoEnabled: !isMobile,
        smaaEnabled: !isMobile,
        powerPreference: isMobile ? 'low-power' : 'high-performance',
    };

    function shouldHideMesh(name) {
        return false; // Hide decisions are now baked into GLB via userData.hide
    }
    window.addEventListener('load', function() {
    setTimeout(function() {
        const container = document.getElementById('model-container');
        const noticeElement = document.getElementById('model-viewer-notice');
        if (!container) return;
        container.style.display = 'block';

        const testCanvas = document.createElement('canvas');
        const hasWebGL2 = !!(testCanvas.getContext('webgl2'));
        if (!hasWebGL2) {
            const noticeEl = document.getElementById('model-viewer-notice');
            if (noticeEl) { noticeEl.textContent = 'Your browser does not support WebGL 2. Please update your browser or device.'; noticeEl.style.display = 'block'; }
            const ldr = document.getElementById('model-loader');
            if (ldr) ldr.remove();
            return;
        }

        const loader = document.getElementById('model-loader');
        let loadingDone = false;
        const loadTimeout = setTimeout(() => {
            if (loadingDone) return;
            console.warn('Model loading timed out after 30s');
            if (loader) { loader.style.transition = 'opacity 0.3s'; loader.style.opacity = '0'; setTimeout(() => loader.remove(), 300); }
            const fallback = document.querySelector('.flex-unit-detail-img');
            if (fallback) fallback.style.display = '';
            if (noticeElement) { noticeElement.textContent = 'Loading took too long. Please try refreshing the page.'; noticeElement.style.display = 'block'; }
        }, 30000);

        container.style.opacity = '0';
        container.style.transform = 'scale(0.5)';

        let unitName = 'armflea';
        const nameField = document.getElementById('unit-name-text');
        if (nameField && nameField.textContent.trim() !== '') {
            unitName = nameField.textContent.trim();
        } else {
            const pathSegments = window.location.pathname.split('/');
            unitName = pathSegments.pop() || pathSegments.pop() || 'armflea';
            if (unitName.toLowerCase().endsWith('.html')) unitName = unitName.substring(0, unitName.length - 5);
        }
        unitName = unitName.replace('.glb', '').replace(/[^a-zA-Z0-9_-]/g, '');

        const urlParams = new URLSearchParams(window.location.search);
        const buildpicMode = urlParams.has('buildpic');
        const rotateOff = buildpicMode || urlParams.has('rotate-off');

        let teamColorValue = 0x0043EE, texturePrefix = 'arm';
        let normalMapScaleY = 2.2, roughnessValue = 0.45;
        let pbrEmissiveIntensityValue = 14.0, pulseMaxValue = buildpicMode ? 0.01 : 1.4;
        const cdnBase = urlParams.has('raw') ? 'https://raw.githubusercontent.com/icexuick/BAR-modelviewer/main/' : 'https://cdn.jsdelivr.net/gh/icexuick/BAR-modelviewer@main/';
        const hdrFile = isMobile ? 'clarens_midday_1k_mobile.hdr' : 'clarens_midday_2k5.hdr';
        let armHdrUrl = cdnBase + 'hdr/' + hdrFile;
        let corHdrUrl = cdnBase + 'hdr/' + hdrFile;
        let legHdrUrl = cdnBase + 'hdr/' + hdrFile;
        let selectedHdrUrl = armHdrUrl;
        if (unitName.startsWith('cor')) {
            teamColorValue = 0xFF0000; texturePrefix = 'cor';
            roughnessValue = 0.50; pbrEmissiveIntensityValue = 15.0;
            selectedHdrUrl = corHdrUrl; VIEWER_CONFIG.envMapIntensity = 0.95;
        } else if (unitName.startsWith('leg')) {
            teamColorValue = 0x00FF00; texturePrefix = 'leg';
            roughnessValue = 0.8; pbrEmissiveIntensityValue = 12.0;
            selectedHdrUrl = legHdrUrl; VIEWER_CONFIG.envMapIntensity = 0.89;
        }
        const scavField = document.getElementById('is-scavenger');
        const isScavenger = scavField && scavField.textContent.trim().toLowerCase() === 'true';
        if (isScavenger) teamColorValue = 0xA41DE2;
        const teamColor = new THREE.Color(teamColorValue);
        VIEWER_CONFIG.teamColor = '#' + teamColor.getHexString();
        VIEWER_CONFIG.hdrUrl = selectedHdrUrl;
        const modelURL = `${cdnBase}glb/${unitName}.glb`;
        const texSubdir = isMobile ? 'tex/mobile/' : 'tex/';
        const baseURL = `${cdnBase}${texSubdir}`;
        const diffuseURL = `${baseURL}${texturePrefix}_color.png`;
        const pbrURL = `${baseURL}${texturePrefix}_other.png`;
        const normalURL = `${baseURL}${texturePrefix}_normal.png`;
        const teamURL = `${baseURL}${texturePrefix}_team.png`;

        const scene = new THREE.Scene();
        window._hdrRotY = 0;
        scene.background = null;
        const camera = new THREE.PerspectiveCamera(35, container.offsetWidth / container.offsetHeight, 0.1, 10000);
        camera.layers.enable(1); // Layer 1 = VFX (visible to camera, excluded from SSAO)
        const renderer = new THREE.WebGLRenderer({
            antialias: false, alpha: true, preserveDrawingBuffer: true,
            powerPreference: performanceSettings.powerPreference
        });
        window.renderer = renderer;
        renderer.setPixelRatio(performanceSettings.pixelRatioCap);
        renderer.setSize(container.offsetWidth, container.offsetHeight);
        renderer.setClearColor(0x000000, 0);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = VIEWER_CONFIG.toneMappingExposure;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = performanceSettings.shadowMapType;
        container.appendChild(renderer.domElement);
        renderer.domElement.style.webkitTapHighlightColor = 'transparent';
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.enableZoom = true; controls.rotateSpeed = VIEWER_CONFIG.mouseRotateSpeed;
        controls.zoomSpeed = 1.2; controls.minDistance = 1; controls.maxDistance = 5000;
        let composer, ssaoPass, smaaPass, mixer = null, currentAction = null, _mvActs = [];
        let isTurntableEnabledByUser = !rotateOff, turntableActive = false, idleTimer = null;
        let areShadowsVisible = true;
        const ui = window._barUISetup && window._barUISetup({
            container, modelURL, unitName, exportWidth: VIEWER_CONFIG.exportWidth,
            getRenderer: () => renderer, getCamera: () => camera, getComposer: () => composer,
            getSsaoPass: () => ssaoPass, getSmaaPass: () => smaaPass,
            getMixer: () => mixer, getCurrentAction: () => currentAction, getMvActs: () => _mvActs,
            onTurntableChange: () => { isTurntableEnabledByUser = !isTurntableEnabledByUser; turntableActive = isTurntableEnabledByUser; if (!turntableActive) clearTimeout(idleTimer); },
            onShadowChange: () => { areShadowsVisible = !areShadowsVisible; if (groundMesh) groundMesh.visible = areShadowsVisible; }
        });

        const lightGroup = new THREE.Group(); scene.add(lightGroup);
        const directionalLight = new THREE.DirectionalLight(VIEWER_CONFIG.keyLightColor, VIEWER_CONFIG.keyLightIntensity);
        directionalLight.position.set(VIEWER_CONFIG.keyLightX, VIEWER_CONFIG.keyLightY, VIEWER_CONFIG.keyLightZ);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.set(performanceSettings.shadowMapSize, performanceSettings.shadowMapSize);
        directionalLight.shadow.bias = -0.0005;
        directionalLight.shadow.radius = VIEWER_CONFIG.shadowRadius;
        directionalLight.shadow.blurSamples = VIEWER_CONFIG.shadowBlurSamples;
        lightGroup.add(directionalLight);
        const directionalLight2 = new THREE.DirectionalLight(VIEWER_CONFIG.fillLightColor, VIEWER_CONFIG.fillLightIntensity);
        directionalLight2.position.set(VIEWER_CONFIG.fillLightX, VIEWER_CONFIG.fillLightY, VIEWER_CONFIG.fillLightZ);
        lightGroup.add(directionalLight2);
        const ambientLight = new THREE.AmbientLight(VIEWER_CONFIG.ambientLightColor, VIEWER_CONFIG.ambientLightIntensity);
        scene.add(ambientLight);
        let material, modelScene, groundMesh, _spinActs = [];
        let toggleOpenClip = null, toggleCloseClip = null, toggleOpenAction = null, toggleCloseAction = null, toggleState = false, toggleAnimating = false;
        const timeUniform = { value: 0.0 };
        const clock = new THREE.Clock();
        let isAltDown = false, isInteracting = false;
        let renderPass, outputPass;
        const textureLoader = new THREE.TextureLoader();
        const gltfLoader = new GLTFLoader();
        const rgbeLoader = new RGBELoader();
        Promise.all([
            rgbeLoader.loadAsync(selectedHdrUrl).then(t => { t.mapping = THREE.EquirectangularReflectionMapping; scene.environment = t; scene.background = null; return t; }).catch(e => { console.warn('HDR load failed, continuing without environment map:', e); return null; }),
            textureLoader.loadAsync(diffuseURL).catch(e => { console.warn('Diffuse texture failed:', e); return null; }),
            textureLoader.loadAsync(pbrURL).catch(e => { console.warn('PBR texture failed:', e); return null; }),
            textureLoader.loadAsync(normalURL).catch(e => { console.warn('Normal texture failed:', e); return null; }),
            textureLoader.loadAsync(teamURL).catch(e => { console.warn('Team texture failed:', e); return null; }),
            gltfLoader.loadAsync(modelURL)
        ]).then(([env, diffuseMap, pbrMap, normalMap, teamMap, gltf]) => {
            loadingDone = true; clearTimeout(loadTimeout);

            setTimeout(() => {
                if (loader) { loader.style.transition = 'opacity 0.3s ease-out'; loader.style.opacity = '0'; setTimeout(() => loader.remove(), 300); }
                container.style.transition = 'opacity 0.45s ease-out, transform 0.7s ease-out';
                container.style.opacity = '1';
                container.style.transform = 'scale(1)';
            }, 900);
            const setupTex = (t, s) => { if(t) { t.colorSpace = s; t.flipY = false; t.wrapS = t.wrapT = THREE.RepeatWrapping; t.anisotropy = performanceSettings.anisotropy; }};
            setupTex(diffuseMap, THREE.SRGBColorSpace); setupTex(pbrMap, THREE.LinearSRGBColorSpace);
            setupTex(normalMap, THREE.LinearSRGBColorSpace); setupTex(teamMap, THREE.LinearSRGBColorSpace);
            material = new THREE.MeshStandardMaterial({
                map: diffuseMap, normalMap: normalMap, normalScale: new THREE.Vector2(1, normalMapScaleY),
                metalness: 1.0, roughness: roughnessValue, envMapIntensity: VIEWER_CONFIG.envMapIntensity,
                side: THREE.DoubleSide, transparent: true
            });

            const highlightUniform = { value: 0.0 };
            const dimUniform = { value: 0.0 };
            const cloakUniform = { value: 0.0 };
            if (window._barShaderSetup) {
                window._barShaderSetup(THREE, material, {
                    pbrMap, teamColor, teamMap, pbrEmissiveIntensityValue, pulseMaxValue,
                    roughnessOffset: VIEWER_CONFIG.roughnessOffset, timeUniform, highlightUniform, dimUniform, cloakUniform
                });
            }
            modelScene = gltf.scene;

            const weaponSummary = {};
            let wpnResult = { spinPieceNames: new Set(), initFireAnims: null, meshWeaponMap: new Map() };
            if (window._barWeaponsSetup) {
                wpnResult = window._barWeaponsSetup(THREE, {
                    modelScene, unitName, material, camera, renderer, lightGroup,
                    shouldHideMesh, weaponSummaryOut: weaponSummary
                });
            }
            const { spinPieceNames, initFireAnims } = wpnResult;
            var poserResult = null;
            if (window._barPoserSetup) { poserResult = window._barPoserSetup(THREE, { modelScene, camera, renderer, controls }); }
            modelScene.traverse(child => {
                if (child.isMesh) {
                    child.material = material;
                    child.userData._highlightVal = 0.0;
                    child.userData._dimVal = 0.0;
                    child.userData._targetHighlight = 0.0;
                    child.userData._targetDim = 0.0;
                    child.onBeforeRender = () => {
                        if (material.userData.shader) {
                            material.userData.shader.uniforms.highlightStrength.value = child.userData._highlightVal;
                            material.userData.shader.uniforms.dimStrength.value = child.userData._dimVal;
                        }
                    };
                    child.frustumCulled = false;
                    if (shouldHideMesh(child.name) || (child.userData && child.userData.hide)) child.visible = false;
                    else { child.castShadow = true; child.receiveShadow = true; }
                }
            });
            scene.add(modelScene);
            modelScene.updateWorldMatrix(true, true);

            let isFactory = false;
            modelScene.traverse(n => { if (n.userData && n.userData.is_factory) isFactory = true; });
            const isConstructor = /com\d*$/.test(unitName) || /^(arm|cor|leg)(a?c[kvas])\d*$/.test(unitName);
            const buildpicFolded = buildpicMode && (isConstructor || unitName.includes('antinuke') || isFactory);

            // Compute bounding box at OPEN pose for autoplay_open units
            let autoplayOpenForBox = false;
            modelScene.traverse(n => { if (n.userData && n.userData.autoplay_open) autoplayOpenForBox = true; });
            if (buildpicFolded) autoplayOpenForBox = false;
            const openClipForBox = autoplayOpenForBox && gltf.animations
                ? gltf.animations.find(c => c.name === 'ActivateOpen') : null;
            let savedTransforms = null;
            if (openClipForBox) {
                savedTransforms = new Map();
                modelScene.traverse(n => {
                    savedTransforms.set(n, {
                        pos: n.position.clone(),
                        rot: n.quaternion.clone(),
                        scl: n.scale.clone()
                    });
                });
                const tmpMixer = new THREE.AnimationMixer(modelScene);
                const tmpAction = tmpMixer.clipAction(openClipForBox);
                tmpAction.setLoop(THREE.LoopOnce, 1);
                tmpAction.clampWhenFinished = true;
                tmpAction.play();
                tmpMixer.update(openClipForBox.duration);
                modelScene.updateWorldMatrix(true, true);
            }

            const box = new THREE.Box3();
            modelScene.traverse(child => {
                if (child.isMesh && child.visible) {
                    child.geometry.computeBoundingBox();
                    const meshBox = child.geometry.boundingBox.clone().applyMatrix4(child.matrixWorld);
                    box.union(meshBox);
                }
            });

            let defaultBox = box;
            if (savedTransforms) {
                modelScene.traverse(n => {
                    const s = savedTransforms.get(n);
                    if (s) { n.position.copy(s.pos); n.quaternion.copy(s.rot); n.scale.copy(s.scl); }
                });
                modelScene.updateWorldMatrix(true, true);
                defaultBox = new THREE.Box3();
                modelScene.traverse(child => {
                    if (child.isMesh && child.visible) {
                        child.geometry.computeBoundingBox();
                        defaultBox.union(child.geometry.boundingBox.clone().applyMatrix4(child.matrixWorld));
                    }
                });
            }

            const _orbH={corafus:92,armafus:88,legafus:96,corfus:74,legfus:33,armjuno:85,corjuno:85,legjuno:78,corgate:53,armgate:38,leggatet3:63,legdeflector:33,corgatet3:93,armgatet3:62,corafust3:184,armafust3:176,legafust3:192};
            if(_orbH[unitName])box.expandByPoint(new THREE.Vector3(0,_orbH[unitName],0));
            const groundBoxEarly = (box.min.y > defaultBox.min.y) ? box : defaultBox;
            const centerBox = box.clone();
            centerBox.min.y = groundBoxEarly.min.y;
            const center = centerBox.getCenter(new THREE.Vector3());
            modelScene.position.sub(center);
            const boundingSphere = new THREE.Sphere();
            box.getBoundingSphere(boundingSphere);
            const objectRadius = boundingSphere.radius;
            const fovVertical = camera.fov * (Math.PI / 180);
            const refR = VIEWER_CONFIG.zoomReferenceRadius;
            const exp = isFactory ? VIEWER_CONFIG.zoomExponentFactories : VIEWER_CONFIG.zoomExponent;
            let distance = Math.abs(refR / Math.sin(fovVertical / 2)) * Math.pow(objectRadius / refR, exp);
            const aspect = container.offsetWidth / container.offsetHeight;
            if (aspect < 1) { distance = distance / aspect; }
            const finalDistance = distance * VIEWER_CONFIG.initialZoomMultiplier;
            camera.position.set(finalDistance, finalDistance * VIEWER_CONFIG.cameraHeightFactor, finalDistance);
            if (buildpicMode) {
                modelScene.rotation.y = THREE.MathUtils.degToRad(parseFloat(urlParams.get('modelRotY')) || 90);
                lightGroup.rotation.y = THREE.MathUtils.degToRad(parseFloat(urlParams.get('lightRotY')) || 83);
                window._hdrRotY = THREE.MathUtils.degToRad(parseFloat(urlParams.get('hdrRotY')) || 180);
                directionalLight.position.y = 3.2;
            }
            controls.target.set(0, 0, 0);
            controls.update();
            const maxDim = objectRadius * 2;
            const sCamSize = maxDim * 3.0;
            directionalLight.shadow.camera.left = directionalLight.shadow.camera.bottom = -sCamSize;
            directionalLight.shadow.camera.right = directionalLight.shadow.camera.top = sCamSize;
            directionalLight.shadow.camera.updateProjectionMatrix();
            const groundMat = new THREE.ShadowMaterial({ color: 0x000000, opacity: 0.4, depthWrite: false });
            groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(maxDim*10, maxDim*10), groundMat);
            groundMesh.rotation.x = -Math.PI / 2;
            let canFly = false, isShip = false, canCloak = false, initCloaked = false;
            modelScene.traverse(n => { if (n.userData) { if (n.userData.can_fly) canFly = true; if (n.userData.is_ship) isShip = true; if (n.userData.can_cloak) canCloak = true; if (n.userData.init_cloaked) initCloaked = true; } });
            const groundBox = groundBoxEarly;
            let groundY = groundBox.min.y - center.y - 1.5;
            if (canFly) groundY -= objectRadius * 0.66;
            else if (isShip) groundY -= objectRadius * 0.30;
            groundMesh.position.y = groundY;
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);
            const noClipUnits = ['leganavybattleship'];
            if (!canFly && !isShip && !noClipUnits.includes(unitName)) {
                renderer.localClippingEnabled = true;
                const floorClipPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -(groundMesh.position.y));
                material.clippingPlanes = [floorClipPlane];
            }
            if (gltf.animations && gltf.animations.length) {
                mixer = new THREE.AnimationMixer(modelScene);
                let spinPieceNamesForAnim = spinPieceNames || new Set();
                if (spinPieceNamesForAnim.size === 0) modelScene.traverse(n => { if (n.userData && n.userData.spin_pieces) n.userData.spin_pieces.forEach(s => { if (!s.startsWith('Spin_')) spinPieceNamesForAnim.add(s.toLowerCase()); }); });
                const firePieceNames = new Set();
                for (const anim of gltf.animations) {
                    if (/^Fire_\d+/.test(anim.name)) {
                        for (const tr of anim.tracks) {
                            const dotIdx = tr.name.indexOf('.');
                            if (dotIdx > 0) firePieceNames.add(tr.name.substring(0, dotIdx).toLowerCase());
                        }
                    }
                }
                const _mvSpins = new Set();
                modelScene.traverse(n => { if (n.userData && n.userData.movement_spins) n.userData.movement_spins.forEach(s => _mvSpins.add(s)); });
                const spinClips = gltf.animations.filter(clip => {
                    if (clip.name.startsWith('Spin_')) {
                        const pn = clip.name.substring(5).toLowerCase();
                        if (firePieceNames.has(pn) || _mvSpins.has(clip.name)) return false;
                        return true;
                    }
                    const au = clip.name.includes('_') ? clip.name.split('_').slice(1).join('_').toLowerCase() : '';
                    return spinPieceNamesForAnim.has(clip.name.toLowerCase()) || spinPieceNamesForAnim.has(au);
                });
                _mvActs = []; _spinActs = [];
                for (const clip of spinClips) { const a = mixer.clipAction(clip); a.setLoop(THREE.LoopRepeat, Infinity); a.play(); _spinActs.push(a); }
                for (const clip of gltf.animations) { if (_mvSpins.has(clip.name)) { const a = mixer.clipAction(clip); a.setLoop(THREE.LoopRepeat, Infinity); a.play(); _mvActs.push(a); } }

                toggleOpenClip = null; toggleCloseClip = null; toggleOpenAction = null; toggleCloseAction = null; toggleState = false; toggleAnimating = false;
                const openClip  = gltf.animations.find(c => c.name === 'ActivateOpen');
                const closeClip = gltf.animations.find(c => c.name === 'ActivateClose');
                if (openClip && closeClip) {
                    toggleOpenClip  = openClip;
                    toggleCloseClip = closeClip;
                    renderer.domElement.style.cursor = 'pointer';
                    let autoplayOpen = false, togglePingPong = false;
                    modelScene.traverse(n => {
                        if (n.userData && n.userData.autoplay_open) autoplayOpen = true;
                        if (n.userData && n.userData.toggle_pingpong) togglePingPong = true;
                    });
                    if (autoplayOpen && !buildpicFolded) {
                        setTimeout(() => {
                            toggleOpenAction = mixer.clipAction(openClip);
                            toggleOpenAction.setLoop(THREE.LoopOnce, 1);
                            toggleOpenAction.clampWhenFinished = true;
                            toggleAnimating = true;
                            toggleOpenAction.reset().play();
                            if (togglePingPong) {
                                toggleOpenAction.clampWhenFinished = false;
                                if (!toggleCloseAction) { toggleCloseAction = mixer.clipAction(closeClip); toggleCloseAction.setLoop(THREE.LoopOnce, 1); toggleCloseAction.clampWhenFinished = false; }
                                mixer.addEventListener('finished', function onPingPong(e) {
                                    if (e.action === toggleOpenAction) {
                                        toggleState = true;
                                        toggleOpenAction.stop();
                                        toggleCloseAction.stop().reset().play();
                                    } else if (e.action === toggleCloseAction) {
                                        toggleState = false;
                                        toggleCloseAction.stop();
                                        toggleOpenAction.stop().reset().play();
                                    }
                                });
                            } else {
                                mixer.addEventListener('finished', function onAutoOpen(e) {
                                    if (e.action === toggleOpenAction) {
                                        toggleState = true;
                                        toggleAnimating = false;
                                        mixer.removeEventListener('finished', onAutoOpen);
                                    }
                                });
                            }
                        }, 1000);
                    }
                } else {
                    renderer.domElement.style.cursor = '';
                }

                const toggleClipNames = new Set(['ActivateOpen', 'ActivateClose']);
                const nonSpinClips = gltf.animations.filter(c => !spinClips.includes(c) && !toggleClipNames.has(c.name) && !c.name.startsWith('Fire_') && c.name !== 'StopWalking' && !_mvSpins.has(c.name));
                let walkClip = nonSpinClips.find(c => c.name.toLowerCase() === 'walk');
                if (!walkClip && !_mvActs.length) walkClip = nonSpinClips[0];
                const hasWalk = !!(walkClip || _mvActs.length);
                if (hasWalk) {
                    const walkEnabled = localStorage.getItem('movementToggle') !== 'false';
                    if (walkClip) { currentAction = mixer.clipAction(walkClip); currentAction.setLoop(THREE.LoopRepeat, Infinity); currentAction.play(); currentAction.weight = walkEnabled ? 1 : 0; }
                    for (const a of _mvActs) a.weight = walkEnabled ? 1 : 0;
                } else {
                    currentAction = null;
                }
                if (ui) ui.setWalkUI(hasWalk);
                if (poserResult) { window._barPoserOnActivate = function(entering) { if (currentAction) currentAction.paused = entering; for (const a of _mvActs) a.paused = entering; for (const a of _spinActs) a.paused = entering; }; }
            } else {
                if (ui) ui.setWalkUI(false);
                renderer.domElement.style.cursor = '';
            }
            if (mixer && initFireAnims) initFireAnims(THREE, mixer, gltf.animations);

            let projectilesUpdate = null;
            if (window._barProjectilesSetup) {
                const projCtx = window._barProjectilesSetup(THREE, {
                    scene: scene, mainScene: scene, camera, modelScene, unitName, weaponSummary, renderer,
                    isToggleOpen: function() {
                        if (!toggleOpenClip || toggleState) return true;
                        if (toggleOpenClip && !toggleOpenClip._barIsWeaponDeploy) {
                            var hasBypass = false;
                            modelScene.traverse(function(n) { if (n.userData && n.userData.toggle_fire_bypass) hasBypass = true; });
                            toggleOpenClip._barIsWeaponDeploy = hasBypass ? 'no' : 'yes';
                        }
                        return toggleOpenClip._barIsWeaponDeploy === 'no';
                    },
                    triggerOpen: function(onDone) {
                        if (!toggleOpenClip || toggleState) { if (onDone) onDone(); return; }
                        if (toggleAnimating) return; // already animating, skip
                        triggerToggle();
                        if (onDone) {
                            mixer.addEventListener('finished', function _onOpen(e) {
                                if (e.action === toggleOpenAction) { mixer.removeEventListener('finished', _onOpen); onDone(); }
                            });
                        }
                    },
                    canFly: canFly
                });
                var projResult = null;
                if (projCtx && window._barProjectilesUpdate) {
                    projResult = window._barProjectilesUpdate(projCtx);
                }
                if (!projResult) console.warn('[BAR] projectiles-update script not loaded — check embed order');
                if (projResult) {
                    projectilesUpdate = projResult.update;
                    var _origFire = projResult.fireWeapon;
                    var _origSingle = projResult.fireSingle;
                    var _decloakFire = function(wnum) { if (window._barDecloak) window._barDecloak(); _origFire(wnum); };
                    var _decloakSingle = function(wnum) { if (window._barDecloak) window._barDecloak(); _origSingle(wnum); };
                    if (wpnResult.setProjectileFire) wpnResult.setProjectileFire(_decloakFire);
                    if (wpnResult.setWpnData && projResult.wpnDataByNum) wpnResult.setWpnData(projResult.wpnDataByNum);
                    if (wpnResult.setFireSingle) wpnResult.setFireSingle(_decloakSingle);
                }
            }

            const renderTarget = new THREE.WebGLRenderTarget(container.offsetWidth, container.offsetHeight, {
                minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat,
                alpha: true, type: isMobile ? THREE.UnsignedByteType : THREE.HalfFloatType, samples: isMobile ? 0 : 4
            });
            composer = new EffectComposer(renderer, renderTarget);
            const renderPass = new RenderPass(scene, camera);
            renderPass.clearColor = new THREE.Color(0, 0, 0); renderPass.clearAlpha = 0;
            composer.addPass(renderPass);
            if (performanceSettings.ssaoEnabled) {
                ssaoPass = new SSAOPass(scene, camera, container.offsetWidth, container.offsetHeight);
                ssaoPass.kernelRadius = performanceSettings.ssaoKernelRadius; ssaoPass.kernelSize = performanceSettings.ssaoKernelSize;
                ssaoPass.minDistance = VIEWER_CONFIG.ssaoMinDist; ssaoPass.maxDistance = VIEWER_CONFIG.ssaoMaxDist;
                const _origOverride = ssaoPass.overrideVisibility.bind(ssaoPass);
                ssaoPass.overrideVisibility = function() {
                    _origOverride();
                    this.scene.traverse(obj => { if (obj.layers.isEnabled(1)) obj.visible = false; });
                };
                composer.addPass(ssaoPass);
            }
            if (performanceSettings.smaaEnabled) {
                smaaPass = new SMAAPass( container.offsetWidth * renderer.getPixelRatio(), container.offsetHeight * renderer.getPixelRatio() );
                composer.addPass(smaaPass);
            }
            outputPass = new OutputPass();
            composer.addPass(outputPass);
            window._editorCtx = { VIEWER_CONFIG, controls, material, renderer, directionalLight, directionalLight2, ambientLight, ssaoPass, groundMesh, areShadowsVisible, scene, camera, composer, smaaPass, modelScene, lightGroup, buildpicMode, unitName, timeUniform, teamColor, cloakUniform, THREE, loadHDR: (url) => { rgbeLoader.load(url, (t) => { t.mapping = THREE.EquirectangularReflectionMapping; scene.environment = t; scene.background = null; }, undefined, (e) => console.error('HDR Error:', e)); } };

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Alt') { e.preventDefault(); isAltDown = true; window._barViewerAltDown = true; container.style.cursor = 'move'; controls.enabled = false; }
                if (e.code === 'Space' && mixer && (currentAction || _mvActs.length) && !e.repeat) { if (currentAction) currentAction.paused = !currentAction.paused; const p = currentAction ? currentAction.paused : !_mvActs[0].paused; for (const a of _mvActs) a.paused = p; }
            });
            window.addEventListener('keyup', (e) => { if (e.key === 'Alt') { isAltDown = false; window._barViewerAltDown = false; container.style.cursor = 'grab'; controls.enabled = true; } });

            function triggerToggle() {
                if (!toggleOpenClip || !toggleCloseClip || toggleAnimating) return;
                toggleAnimating = true;
                const isClosing = toggleState; // going from open→closed
                const playClip   = isClosing ? toggleCloseClip : toggleOpenClip;
                const resetClip  = isClosing ? toggleOpenClip  : toggleCloseClip;
                if (!toggleOpenAction)  { toggleOpenAction  = mixer.clipAction(toggleOpenClip);  toggleOpenAction.setLoop(THREE.LoopOnce, 1);  toggleOpenAction.clampWhenFinished  = true; }
                if (!toggleCloseAction) { toggleCloseAction = mixer.clipAction(toggleCloseClip); toggleCloseAction.setLoop(THREE.LoopOnce, 1); toggleCloseAction.clampWhenFinished = true; }
                const playAction  = isClosing ? toggleCloseAction : toggleOpenAction;
                const resetAction = isClosing ? toggleOpenAction  : toggleCloseAction;
                const toggleStopsWalk = unitName === 'leganavybattleship';
                if (toggleStopsWalk && isClosing && currentAction) currentAction.weight = 0;
                resetAction.stop();
                playAction.reset().play();
                toggleState = !toggleState;
                mixer.addEventListener('finished', function onFinished(e) {
                    if (e.action === playAction) {
                        toggleAnimating = false;
                        if (toggleStopsWalk && !isClosing && currentAction) {
                            const walkEnabled = localStorage.getItem('movementToggle') !== 'false';
                            if (walkEnabled) currentAction.weight = 1;
                        }
                        mixer.removeEventListener('finished', onFinished);
                    }
                });
            }

            let pointerDownPos = null;
            renderer.domElement.addEventListener('pointerdown', (e) => {
                pointerDownPos = { x: e.clientX, y: e.clientY };
            });
            const _toggleRaycaster = new THREE.Raycaster();
            const _togglePointer = new THREE.Vector2();
            renderer.domElement.addEventListener('pointerup', (e) => {
                if (window._barPoserActive) { pointerDownPos = null; return; }
                if (!pointerDownPos || !toggleOpenClip) return;
                const dx = e.clientX - pointerDownPos.x;
                const dy = e.clientY - pointerDownPos.y;
                if (Math.sqrt(dx*dx + dy*dy) < 5) {
                    const rect = renderer.domElement.getBoundingClientRect();
                    _togglePointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    _togglePointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                    _toggleRaycaster.setFromCamera(_togglePointer, camera);
                    const hits = _toggleRaycaster.intersectObject(modelScene, true);
                    const hitWeapon = hits.find(h => wpnResult.meshWeaponMap.has(h.object.uuid));
                    if (!hitWeapon) triggerToggle();
                }
                pointerDownPos = null;
            });
            let didDrag = false; let dragOrigin = null;
            renderer.domElement.addEventListener('pointerdown', (e) => { dragOrigin = { x: e.clientX, y: e.clientY }; });
            renderer.domElement.addEventListener('pointermove', (e) => {
                if (isInteracting && !didDrag && dragOrigin) {
                    const dx = e.clientX - dragOrigin.x, dy = e.clientY - dragOrigin.y;
                    if (dx*dx + dy*dy > 25) { didDrag = true; turntableActive = false; clearTimeout(idleTimer); }
                }
            });
            controls.addEventListener('start', () => { isInteracting = true; didDrag = false; });
            controls.addEventListener('end', () => { isInteracting = false; dragOrigin = null; if (didDrag && isTurntableEnabledByUser) idleTimer = setTimeout(() => { if (!isInteracting) { didDrag = false; turntableActive = true; } }, 3000); });
            if (isTurntableEnabledByUser) turntableActive = true;

            let cloakUpdate = null;
            if (window._barCloakSetup) {
                const cloakResult = window._barCloakSetup({ canCloak, initCloaked, cloakUniform, modelScene, teamColor });
                cloakUpdate = cloakResult.update;
            }
            const envRotMat4 = new THREE.Matrix4();
            const envRotMat3 = new THREE.Matrix3();

            (function() {
                var ADD = THREE.AdditiveBlending, DS = THREE.DoubleSide;
                var wObjs = [];
                function w(o) { o.renderOrder = 998; o.layers.enable(1); scene.add(o); wObjs.push(o); return o; }
                w(new THREE.Sprite(new THREE.SpriteMaterial({color:0xffffff,transparent:true,opacity:0.001,blending:ADD,depthWrite:false}))).scale.set(0.001,0.001,1);
                var cg = new THREE.CylinderGeometry(0.001,0.001,0.001,4,1,true);
                w(new THREE.Mesh(cg, new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.001,blending:ADD,depthWrite:false,side:DS})));
                w(new THREE.Mesh(cg.clone(), new THREE.MeshBasicMaterial({color:0x444444,depthWrite:false})));
                w(new THREE.Mesh(new THREE.PlaneGeometry(0.001,0.001), new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.001,blending:ADD,depthWrite:false,side:DS})));
                w(new THREE.Mesh(new THREE.ConeGeometry(0.001,0.001,4), new THREE.MeshBasicMaterial({color:0xffffff,depthWrite:false})));
                w(new THREE.Mesh(new THREE.SphereGeometry(0.001,6,4), new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.001,blending:ADD,depthWrite:false})));
                composer.render();
                for (var i = 0; i < wObjs.length; i++) { scene.remove(wObjs[i]); if (wObjs[i].geometry) wObjs[i].geometry.dispose(); if (wObjs[i].material) wObjs[i].material.dispose(); }
            })();

            const interval = 1000 / 120;
            let lastTime = 0, animRun = false;
            const animate = (timestamp) => {
                if (window._barViewMode === '2D') { animRun = false; return; }
                requestAnimationFrame(animate);
                const delta = timestamp - lastTime;
                if (delta > interval) {
                    lastTime = timestamp - (delta % interval);
                    const clockDelta = clock.getDelta();
                    timeUniform.value = clock.elapsedTime;
                    if (material.userData.shader && material.userData.shader.uniforms.envMapRotation) {
                        envRotMat4.makeRotationY(lightGroup.rotation.y + (window._hdrRotY || 0));
                        envRotMat3.setFromMatrix4(envRotMat4);
                        material.userData.shader.uniforms.envMapRotation.value.copy(envRotMat3);
                    }
                    if (window._barPaused) { controls.update(); composer.render(); return; }
                    if (turntableActive && !didDrag && !isAltDown && !window._barTooltipHovered) modelScene.rotation.y += VIEWER_CONFIG.autoRotationSpeed * clockDelta;
                    if (mixer) mixer.update(clockDelta);
                    if (projectilesUpdate) projectilesUpdate(clockDelta);

                    const lerpSpeed = 8.0 * clockDelta;
                    modelScene.traverse(child => {
                        if (!child.isMesh) return;
                        child.userData._highlightVal += (child.userData._targetHighlight - child.userData._highlightVal) * Math.min(lerpSpeed, 1.0);
                        child.userData._dimVal      += (child.userData._targetDim      - child.userData._dimVal     ) * Math.min(lerpSpeed, 1.0);
                    });
                    if (cloakUpdate) cloakUpdate(clockDelta);
                    controls.update();
                    composer.render();
                }
            };
            const handleResize = () => {
                const w = container.offsetWidth; const h = container.offsetHeight;
                if (w === 0 || h === 0) return;
                camera.aspect = w / h; camera.updateProjectionMatrix();
                renderer.setSize(w, h); composer.setSize(w, h);
                if(ssaoPass) ssaoPass.setSize(w, h);
                if(smaaPass) smaaPass.setSize(w * renderer.getPixelRatio(), h * renderer.getPixelRatio());
                composer.render();
            };
            const resizeObserver = new ResizeObserver(handleResize);
            resizeObserver.observe(container);
            lastTime = performance.now();
            window._barAnimateRestart = () => { if (animRun) return; animRun = true; lastTime = performance.now(); requestAnimationFrame(animate); };
            if (window._barViewMode !== '2D') { animRun = true; requestAnimationFrame(animate); }
        }).catch(err => {
            loadingDone = true; clearTimeout(loadTimeout);
            console.error("LOAD ERROR:", err);
            if (loader) { loader.style.transition = 'opacity 0.3s'; loader.style.opacity = '0'; setTimeout(() => loader.remove(), 300); }
            const fallback = document.querySelector('.flex-unit-detail-img');
            if (fallback) fallback.style.display = '';
            if(noticeElement) { noticeElement.textContent = "Error loading 3D model."; noticeElement.style.display = 'block'; }
        });
    }, 900);
});
</script>
