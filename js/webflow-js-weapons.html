<script>
window._barWeaponsSetup = function(THREE, opts) {
    const { modelScene, unitName, material, camera, renderer, lightGroup,
            shouldHideMesh, weaponSummaryOut } = opts;

    const weaponSummary = {};
    var unitRole = null;
    var isToggleable = false;
    var fireDelays = {};
    modelScene.traverse(function(node) {
        if (node.userData && node.userData.weapon_summary) {
            Object.assign(weaponSummary, node.userData.weapon_summary);
        }
        if (node.userData && node.userData.unit_role) {
            unitRole = node.userData.unit_role;
        }
        if (node.userData && node.userData.toggleable) {
            isToggleable = true;
        }
        if (node.userData && node.userData.fire_delays) {
            Object.assign(fireDelays, node.userData.fire_delays);
        }
    });
    Object.assign(weaponSummaryOut, weaponSummary);

    var meshWeaponMap = new Map();
    var visualMeshesByWeapon = new Map();
    modelScene.traverse(function(node) {
        if (!node.isMesh) return;
        var weapons = node.userData && node.userData.weapons;
        var roles = node.userData && node.userData.weapon_roles;
        if (!weapons || !weapons.length || !roles || !roles.length) return;
        if (!roles.includes('visual')) return;
        if (shouldHideMesh(node.name)) return;
        var wnum = weapons[0];
        var summary = weaponSummary[String(wnum)];
        meshWeaponMap.set(node.uuid, { num: wnum, def: summary ? summary.def : null });
        for (var i = 0; i < weapons.length; i++) {
            var wn = weapons[i];
            if (!visualMeshesByWeapon.has(wn)) visualMeshesByWeapon.set(wn, []);
            visualMeshesByWeapon.get(wn).push(node);
        }
    });

    var spinPieceNames = null;
    var constructorPieceNames = null;
    modelScene.traverse(function(node) {
        if (node.userData && node.userData.spin_pieces) {
            spinPieceNames = new Set(node.userData.spin_pieces
                .filter(function(n) { return !n.startsWith('Spin_'); })
                .map(function(n) { return n.toLowerCase(); }));
        }
        if (node.userData && node.userData.constructor_pieces) {
            constructorPieceNames = new Set(node.userData.constructor_pieces.map(function(n) { return n.toLowerCase(); }));
        }
    });

    // Role tooltip labels
    var ROLE_LABELS = {
        RADAR: 'Radar', SONAR: 'Sonar', RADAR_SONAR: 'Radar & Sonar',
        JAMMER: 'Jammer', RADAR_JAMMER: 'Radar & Jammer'
    };

    var unitRoleMeshMap = new Map();
    var roleGroupMeshes = [];     // meshes for radar/sonar/jammer spin pieces
    var constructorGroupMeshes = []; // meshes for constructor arm pieces

    // Filter spin pieces: remove any that are ancestors of other spin pieces
    // (e.g. armrad turret is parent of dish — only dish should be hoverable)
    if (spinPieceNames && spinPieceNames.size > 1) {
        var spinNodes = [];
        modelScene.traverse(function(node) {
            if (spinPieceNames.has(node.name.toLowerCase())) spinNodes.push(node);
        });
        var ancestorNames = new Set();
        for (var si = 0; si < spinNodes.length; si++) {
            var p = spinNodes[si].parent;
            while (p) {
                if (spinPieceNames.has(p.name.toLowerCase())) ancestorNames.add(p.name.toLowerCase());
                p = p.parent;
            }
        }
        if (ancestorNames.size > 0) {
            ancestorNames.forEach(function(n) { spinPieceNames.delete(n); });
        }
    }

    // Filter spin pieces: remove propellers, fans, thrusters, wheels etc. — never radar
    if (spinPieceNames && spinPieceNames.size > 0) {
        var propPatterns = /^(fan|prop|thruster|rotor|blade|turbine|wheel|tyre|tire|screw|vent|engine|exhaust|motor)/;
        var toRemove = [];
        spinPieceNames.forEach(function(n) { if (propPatterns.test(n)) toRemove.push(n); });
        for (var pi = 0; pi < toRemove.length; pi++) spinPieceNames.delete(toRemove[pi]);
    }

    // Register spin pieces + their subtrees as radar/sonar hoverable
    // Only for dedicated radar/sonar/jammer units (no weapons).
    // Combat units (commanders, scouts) have radar as secondary ability —
    // their spin pieces are decorative, not hoverable radar modules.
    if (unitRole && spinPieceNames && spinPieceNames.size > 0 &&
        meshWeaponMap.size === 0 &&
        (unitRole === 'RADAR' || unitRole === 'SONAR' || unitRole === 'RADAR_SONAR' ||
         unitRole === 'JAMMER' || unitRole === 'RADAR_JAMMER')) {
        var roleLabel = ROLE_LABELS[unitRole] || unitRole;
        // Collect all meshes in subtrees rooted at spin pieces
        var spinRoots = [];
        modelScene.traverse(function(node) {
            if (spinPieceNames.has(node.name.toLowerCase())) spinRoots.push(node);
        });
        for (var ri = 0; ri < spinRoots.length; ri++) {
            spinRoots[ri].traverse(function(node) {
                if (!node.isMesh) return;
                if (shouldHideMesh(node.name)) return;
                if (meshWeaponMap.has(node.uuid)) return;
                unitRoleMeshMap.set(node.uuid, roleLabel);
                roleGroupMeshes.push(node);
            });
        }
    }

    // Register constructor pieces as hoverable group
    // Pieces that are also weapons still get added to constructorGroupMeshes
    // so DOM us-type="nano" hover can highlight them, but they keep their
    // weapon tooltip priority for 3D hover (meshWeaponMap takes precedence).
    if (constructorPieceNames && constructorPieceNames.size > 0) {
        modelScene.traverse(function(node) {
            if (!node.isMesh) return;
            if (shouldHideMesh(node.name)) return;
            if (constructorPieceNames.has(node.name.toLowerCase())) {
                if (!meshWeaponMap.has(node.uuid)) {
                    unitRoleMeshMap.set(node.uuid, 'Construction Module');
                }
                constructorGroupMeshes.push(node);
            }
        });
    }

    function getDomWeaponNames() {
        var map = new Map();
        document.querySelectorAll('.uw-item-flex[data-wpn-slug]').forEach(function(el) {
            var slug = el.getAttribute('data-wpn-slug');
            var nameEl = el.querySelector('[wpn-cat-link]');
            var name = nameEl ? nameEl.textContent.trim() : '';
            var desc = el.getAttribute('data-wpn-description') || '';
            if (slug) map.set(slug, { name: name, desc: desc });
        });
        return map;
    }
    function getWeaponInfo(winfo) {
        if (winfo.def) {
            var slug = unitName + '-' + winfo.def.replace(/_/g, '-');
            var names = getDomWeaponNames();
            if (names.has(slug)) return names.get(slug);
        }
        return null;
    }

    var tooltip = document.createElement('div');
    tooltip.style.cssText = 'position:fixed;pointer-events:none;display:none;background:rgba(0,0,0,0.78);color:#fff;font-size:14px;font-family:Poppins,sans-serif;font-weight:300;padding:8px 14px;border-radius:5px;border:1px solid rgba(255,255,255,0.18);white-space:nowrap;z-index:9999;transform:translateZ(0);will-change:transform;-webkit-font-smoothing:antialiased;letter-spacing:-0.3px';
    var tooltipName = document.createElement('div');
    tooltipName.style.cssText = 'text-transform:uppercase;letter-spacing:-0.7px;font-size:16px;font-weight:300';
    var tooltipDesc = document.createElement('div');
    tooltipDesc.style.cssText = 'font-size:12px;font-weight:400;color:rgba(255,255,255,0.6);margin-top:1px;-webkit-font-smoothing:antialiased;letter-spacing:-0.3px';
    tooltip.appendChild(tooltipName);
    tooltip.appendChild(tooltipDesc);
    document.body.appendChild(tooltip);
    var raycaster = new THREE.Raycaster();
    var pointer = new THREE.Vector2();
    var tooltipHideTimer = null;
    function showTooltip(x, y, winfo) {
        var info = getWeaponInfo(winfo);
        if (!info) return;
        tooltipName.textContent = info.name;
        tooltipDesc.textContent = info.desc;
        tooltipDesc.style.display = info.desc ? 'block' : 'none';
        tooltip.style.display = 'block';
        tooltip.style.left = Math.round(x + 14) + 'px';
        tooltip.style.top  = Math.round(y - 8) + 'px';
        window._barTooltipHovered = true;
    }
    function showRoleTooltip(x, y, rl) {
        tooltipName.textContent = rl;
        tooltipDesc.style.display = 'none';
        tooltip.style.display = 'block';
        tooltip.style.left = Math.round(x + 14) + 'px';
        tooltip.style.top  = Math.round(y - 8) + 'px';
        window._barTooltipHovered = true;
    }
    function hideTooltip() { tooltip.style.display = 'none'; window._barTooltipHovered = false; }

    var hoveredWeaponNum = null;
    var activeDomEl = null;
    var slugToWnum = new Map();
    for (var wnum in weaponSummary) {
        var s = weaponSummary[wnum];
        if (!s || !s.def) continue;
        slugToWnum.set(unitName + '-' + s.def.replace(/_/g, '-'), parseInt(wnum));
    }

    function setWeaponHighlight(wnum) {
        if (wnum === hoveredWeaponNum) return;
        hoveredWeaponNum = wnum;
        var wnumsToHighlight = new Set();
        if (wnum !== null) {
            var hovDef = weaponSummary[String(wnum)] ? weaponSummary[String(wnum)].def : null;
            for (var wn in weaponSummary) {
                if (hovDef ? weaponSummary[wn].def === hovDef : parseInt(wn) === wnum)
                    wnumsToHighlight.add(parseInt(wn));
            }
        }
        var highlightedUuids = new Set();
        if (wnum !== null) {
            wnumsToHighlight.forEach(function(wn) {
                (visualMeshesByWeapon.get(wn) || []).forEach(function(m) { highlightedUuids.add(m.uuid); });
            });
        }
        modelScene.traverse(function(child) {
            if (!child.isMesh) return;
            if (highlightedUuids.has(child.uuid)) {
                child.userData._targetHighlight = 1.0;
                child.userData._targetDim = 0.0;
            } else {
                child.userData._targetHighlight = 0.0;
                child.userData._targetDim = wnum !== null ? 1.0 : 0.0;
            }
        });
        if (activeDomEl) { activeDomEl.classList.remove('is-hovered'); activeDomEl = null; }
        if (wnum !== null) {
            var sum = weaponSummary[String(wnum)];
            if (sum && sum.def) {
                var fullSlug = unitName + '-' + sum.def.replace(/_/g, '-');
                var domEl = document.querySelector('.uw-item-flex[data-wpn-slug="' + fullSlug + '"]');
                if (domEl) { domEl.classList.add('is-hovered'); activeDomEl = domEl; }
            }
        }
    }

    // Role highlight: highlight all meshes in the same group (constructor or radar/sonar spin)
    var hoveredRoleLabel = null;
    function setRoleHighlight(label) {
        if (label === hoveredRoleLabel) return;
        hoveredRoleLabel = label;
        var group = null;
        if (label === 'Construction Module') group = constructorGroupMeshes;
        else if (label) group = roleGroupMeshes;
        var highlightedUuids = new Set();
        if (group) {
            for (var i = 0; i < group.length; i++) highlightedUuids.add(group[i].uuid);
        }
        modelScene.traverse(function(child) {
            if (!child.isMesh) return;
            if (highlightedUuids.has(child.uuid)) {
                child.userData._targetHighlight = 1.0;
                child.userData._targetDim = 0.0;
            } else {
                child.userData._targetHighlight = 0.0;
                child.userData._targetDim = label !== null ? 1.0 : 0.0;
            }
        });
    }

    // Map us-type attribute values to the role highlight label
    var US_TYPE_MAP = { radar: null, sonar: null, nano: 'Construction Module' };
    if (unitRole && roleGroupMeshes.length > 0) {
        var rl = ROLE_LABELS[unitRole] || unitRole;
        if (unitRole.indexOf('RADAR') !== -1) US_TYPE_MAP.radar = rl;
        if (unitRole.indexOf('SONAR') !== -1) US_TYPE_MAP.sonar = rl;
        if (unitRole === 'JAMMER' || unitRole.indexOf('JAMMER') !== -1) US_TYPE_MAP.jammer = rl;
    }

    document.addEventListener('mouseover', function(e) {
        // Weapon DOM hover
        var wpnEl = e.target.closest('.uw-item-flex[data-wpn-slug]');
        if (wpnEl) {
            var slug = wpnEl.getAttribute('data-wpn-slug');
            var wn = slugToWnum.get(slug);
            if (wn !== undefined && visualMeshesByWeapon.has(wn)) { setRoleHighlight(null); setWeaponHighlight(wn); }
            return;
        }
        // Unit stat DOM hover (radar/sonar/nano)
        var statEl = e.target.closest('[us-type]');
        if (statEl) {
            var usType = statEl.getAttribute('us-type');
            if (usType === 'nano' && constructorGroupMeshes.length > 0) {
                setWeaponHighlight(null); setRoleHighlight('Construction Module');
            } else if (US_TYPE_MAP[usType]) {
                setWeaponHighlight(null); setRoleHighlight(US_TYPE_MAP[usType]);
            }
        }
    });
    document.addEventListener('mouseout', function(e) {
        var wpnEl = e.target.closest('.uw-item-flex[data-wpn-slug]');
        if (wpnEl) {
            if (!wpnEl.contains(e.relatedTarget)) setWeaponHighlight(null);
            return;
        }
        var statEl = e.target.closest('[us-type]');
        if (statEl && !statEl.contains(e.relatedTarget)) {
            setRoleHighlight(null);
        }
    });

    window.addEventListener('mousemove', function(e) {
        if (window._barViewerAltDown) { lightGroup.rotation.y += e.movementX * 0.01; hideTooltip(); setWeaponHighlight(null); setRoleHighlight(null); return; }
        if (meshWeaponMap.size === 0 && unitRoleMeshMap.size === 0) return;
        var rect = renderer.domElement.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
            hideTooltip();
            if (!e.target.closest('.uw-item-flex[data-wpn-slug]') && !e.target.closest('[us-type]')) { setWeaponHighlight(null); setRoleHighlight(null); }
            return;
        }
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        var hits = raycaster.intersectObject(modelScene, true);
        var hit = hits.find(function(h) { return meshWeaponMap.has(h.object.uuid) || unitRoleMeshMap.has(h.object.uuid); });
        if (hit) {
            if (meshWeaponMap.has(hit.object.uuid)) {
                var winfo = meshWeaponMap.get(hit.object.uuid);
                showTooltip(e.clientX, e.clientY, winfo);
                setRoleHighlight(null);
                setWeaponHighlight(winfo.num);
            } else {
                var rl = unitRoleMeshMap.get(hit.object.uuid);
                showRoleTooltip(e.clientX, e.clientY, rl);
                setWeaponHighlight(null);
                setRoleHighlight(rl);
            }
        } else {
            hideTooltip();
            setWeaponHighlight(null);
            setRoleHighlight(null);
        }
    });

    renderer.domElement.addEventListener('touchstart', function(e) {
        if ((meshWeaponMap.size === 0 && unitRoleMeshMap.size === 0) || e.touches.length !== 1) return;
        var touch = e.touches[0];
        var rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        var hits = raycaster.intersectObject(modelScene, true);
        var hit = hits.find(function(h) { return meshWeaponMap.has(h.object.uuid) || unitRoleMeshMap.has(h.object.uuid); });
        if (hit) {
            if (meshWeaponMap.has(hit.object.uuid)) {
                showTooltip(touch.clientX, touch.clientY, meshWeaponMap.get(hit.object.uuid));
            } else {
                showRoleTooltip(touch.clientX, touch.clientY, unitRoleMeshMap.get(hit.object.uuid));
            }
            clearTimeout(tooltipHideTimer);
            tooltipHideTimer = setTimeout(hideTooltip, 2000);
        }
    }, { passive: true });

    // Fire animation support — called later once mixer + animations are available
    var fireActions = {};  // weapon num → THREE.AnimationAction

    // Read fire_rotary metadata from model extras (gatling spindle advance)
    var fireRotary = null;
    var barrelSpins = {};
    modelScene.traverse(function(node) {
        if (node.userData && node.userData.fire_rotary) {
            fireRotary = node.userData.fire_rotary;
        }
        if (node.userData && node.userData.barrel_spins) {
            node.userData.barrel_spins.forEach(function(n) { barrelSpins[n] = true; });
        }
    });

    // --- Fire system: playFire + click handlers (always active, even without animations) ---
    var _fireTimers = {};  // def → [timeoutIds] for pending stagger timers
    var _initMixer = null, _rotaryNodes = {};
    var _cycleActions = {};  // wnum → [action0, action1, ...] for per-barrel cycling
    var _cycleIndex = {};    // wnum → current barrel index

    function getFireActions(wnum) {
        if (Object.keys(fireActions).length === 0) return [];
        var def = weaponSummary[String(wnum)] ? weaponSummary[String(wnum)].def : null;
        var actions = [];
        if (def) {
            var wnums = Object.keys(fireActions).map(Number).sort(function(a,b){return a-b;});
            for (var i = 0; i < wnums.length; i++) {
                var wn = wnums[i];
                var wnDef = weaponSummary[String(wn)] ? weaponSummary[String(wn)].def : null;
                if (wnDef === def) actions.push(fireActions[wn]);
            }
        }
        if (actions.length === 0 && fireActions[wnum]) actions.push(fireActions[wnum]);
        return actions;
    }

    function playFire(wnum) {
        var actions = getFireActions(wnum);
        if (actions.length === 0) {
            if (_projectileFireFn) _projectileFireFn(wnum);
            return;
        }
        var def = weaponSummary[String(wnum)] ? weaponSummary[String(wnum)].def : ('w' + wnum);
        if (_fireTimers[def]) {
            _fireTimers[def].forEach(function(t) { clearTimeout(t); });
        }
        _fireTimers[def] = [];
        // Separate deploy actions (play once, stay clamped) from normal fire actions
        var deployActs = [], normalActs = [];
        for (var j = 0; j < actions.length; j++) {
            var clipName = actions[j].getClip().name;
            var cfm2 = clipName.match(/^Fire_(\d+)$/);
            if (cfm2 && _deployActions[parseInt(cfm2[1])]) deployActs.push(actions[j]);
            else normalActs.push(actions[j]);
        }
        // Deploy actions: play only on first fire, stay in deployed pose
        for (var di = 0; di < deployActs.length; di++) {
            var da = deployActs[di];
            var deployed = da.paused && da.time >= da.getClip().duration - 0.01;
            if (!deployed && !da.isRunning()) {
                da.reset().play();
            }
            // Fire projectile after deploy finishes (or immediately if already deployed)
            var daClip = da.getClip().name;
            var daCfm = daClip.match(/^Fire_(\d+)$/);
            if (daCfm && _projectileFireFn) {
                var dwn = parseInt(daCfm[1]);
                if (deployed) {
                    var fd = fireDelays[String(dwn)] || 0;
                    if (fd > 0) {
                        (function(w, d) { var tid = setTimeout(function() { _projectileFireFn(w); }, d * 1000); _fireTimers[def].push(tid); })(dwn, fd);
                    } else { _projectileFireFn(dwn); }
                } else {
                    var dDelay = da.getClip().duration + (fireDelays[String(dwn)] || 0);
                    (function(w, d) { var tid = setTimeout(function() { _projectileFireFn(w); }, d * 1000); _fireTimers[def].push(tid); })(dwn, dDelay);
                }
            }
        }
        // Fire each weapon: cycling weapons play one barrel, others play normally.
        // Multiple weapons with same def are staggered with 400ms delay.
        var STAGGER_MS = 400;

        // Helper: play one cycling barrel animation + fire one projectile
        function _playCycleShot(action, actWnum) {
            var clipName = action.getClip().name;
            var playedAction = action;
            if (actWnum && _cycleActions[actWnum]) {
                var cycleArr = _cycleActions[actWnum];
                var idx = _cycleIndex[actWnum] || 0;
                playedAction = cycleArr[idx % cycleArr.length];
                _cycleIndex[actWnum] = (idx + 1) % cycleArr.length;
                if (barrelSpins[clipName]) {
                    action.stop().reset().play();
                }
            }
            playedAction.stop().reset().play();
            // For cycling weapons: fireSingle (no burst — we drive burst ourselves)
            // For non-cycling weapons: fireWeapon (projectile system handles burst)
            var isCycling = actWnum && _cycleActions[actWnum];
            var fireFn = (isCycling && _fireSingleFn) ? _fireSingleFn : _projectileFireFn;
            if (actWnum && fireFn) {
                var fDelay = fireDelays[String(actWnum)];
                if (fDelay && fDelay > 0) {
                    setTimeout(function() { fireFn(actWnum); }, fDelay * 1000);
                } else {
                    fireFn(actWnum);
                }
            }
            if (_initMixer) _initMixer.addEventListener('finished', function onDone(e) {
                if (e.action === playedAction) {
                    playedAction.stop();
                    var cn = playedAction.getClip().name;
                    var rot = _rotaryNodes[cn];
                    if (rot) {
                        rot.accumRad += rot.stepRad;
                        rot.node.rotation[rot.axis] = rot.accumRad;
                    }
                    _initMixer.removeEventListener('finished', onDone);
                }
            });
        }

        for (var i = 0; i < normalActs.length; i++) {
            (function(action, delay) {
                var tid = setTimeout(function() {
                    var clipName = action.getClip().name;
                    var cfmW = clipName.match(/^Fire_(\d+)/);
                    var actWnum = cfmW ? parseInt(cfmW[1]) : 0;
                    // Per-barrel cycling with burst: weapons system drives all shots
                    // (animation + single projectile each), bypassing projectile burst.
                    var hasCycle = actWnum && _cycleActions[actWnum];
                    var burstCount = 1, burstRate = 100;
                    if (hasCycle && _wpnData) {
                        var wd = _wpnData[String(actWnum)];
                        if (wd && wd.burst > 1) {
                            burstCount = wd.burst;
                            burstRate = (wd.burstrate || 0.1) * 1000;
                        }
                    }
                    if (hasCycle && burstCount > 1) {
                        // Drive all burst shots: each gets animation + single projectile
                        for (var bi = 0; bi < burstCount; bi++) {
                            (function(a, w, d) {
                                var btid = setTimeout(function() { _playCycleShot(a, w); }, d);
                                _fireTimers[def].push(btid);
                            })(action, actWnum, bi * burstRate);
                        }
                    } else {
                        // Non-cycling or no burst: original behavior
                        _playCycleShot(action, actWnum);
                    }
                }, delay);
                _fireTimers[def].push(tid);
            })(normalActs[i], i * STAGGER_MS);
        }
    }

    // Click on 3D weapon mesh → fire
    renderer.domElement.addEventListener('click', function(e) {
        if (meshWeaponMap.size === 0) return;
        var rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        var hits = raycaster.intersectObject(modelScene, true);
        var hit = hits.find(function(h) { return meshWeaponMap.has(h.object.uuid); });
        if (hit) {
            var winfo = meshWeaponMap.get(hit.object.uuid);
            playFire(winfo.num);
        }
    });

    // Click / hold on .uw-img → fire weapon
    var _holdInterval = null;
    function _fireFromEl(el) {
        if (!el) return;
        var slug = el.getAttribute('data-wpn-slug');
        var wnum = slugToWnum.get(slug);
        if (wnum !== undefined) playFire(wnum);
    }
    function _stopHold() {
        if (_holdInterval) { clearInterval(_holdInterval); _holdInterval = null; }
    }
    document.addEventListener('mousedown', function(e) {
        if (!e.target.closest('.uw-img')) return;
        var el = e.target.closest('.uw-item-flex[data-wpn-slug]');
        if (!el) return;
        var reload = parseFloat(el.getAttribute('data-wpn-reload') || el.querySelector('[data-wpn-reload]') && el.querySelector('[data-wpn-reload]').getAttribute('data-wpn-reload')) || 2;
        _fireFromEl(el);
        if (reload < 0.3) {
            var beamtime = parseFloat(el.getAttribute('data-wpn-beamtime') || (el.querySelector('[data-wpn-beamtime]') && el.querySelector('[data-wpn-beamtime]').getAttribute('data-wpn-beamtime'))) || 0.15;
            _holdInterval = setInterval(function() { _fireFromEl(el); }, Math.max(beamtime, 0.05) * 1000);
        }
    });
    document.addEventListener('mouseup', _stopHold);
    document.addEventListener('mouseleave', _stopHold);

    // Keyboard shortcuts: press 1-9 to fire weapon group (DOM order), max 10/sec
    var _wpnGroupEls = Array.from(document.querySelectorAll('.uw-item-flex[data-wpn-slug]'));
    var _lastKeyFire = 0;
    document.addEventListener('keydown', function(e) {
        var k = e.key;
        if (k >= '1' && k <= '9' && !e.ctrlKey && !e.altKey && !e.metaKey) {
            var tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
            var now = performance.now();
            if (now - _lastKeyFire < 50) return;
            _lastKeyFire = now;
            var idx = parseInt(k) - 1;
            if (idx < _wpnGroupEls.length) {
                e.preventDefault();
                _fireFromEl(_wpnGroupEls[idx]);
            }
        }
    });

    // Mark weapon meshes with pointer cursor
    if (meshWeaponMap.size > 0) {
        renderer.domElement.style.cursor = 'pointer';
    }

    var _deployActions = {};
    function initFireAnims(THREE, mixer, animations) {
        if (!mixer || !animations) return;
        _initMixer = mixer;
        // Collect toggle track names (piece.property) to detect redundant Fire_N clips
        var toggleTrackNames = new Set();
        var toggleClip = animations.find(function(c) { return c.name === 'ActivateOpen'; });
        if (toggleClip) {
            for (var tt = 0; tt < toggleClip.tracks.length; tt++) {
                toggleTrackNames.add(toggleClip.tracks[tt].name.toLowerCase());
            }
        }
        for (var i = 0; i < animations.length; i++) {
            var clip = animations[i];
            // Per-barrel cycling clips (Fire_1_0, Fire_1_1, ...): register for cycling
            var fcm = clip.name.match(/^Fire_(\d+)_(\d+)$/);
            if (fcm) {
                var cwnum = parseInt(fcm[1]);
                var action = mixer.clipAction(clip);
                action.setLoop(THREE.LoopOnce, 1);
                action.clampWhenFinished = false;
                if (!_cycleActions[cwnum]) { _cycleActions[cwnum] = []; _cycleIndex[cwnum] = 0; }
                _cycleActions[cwnum].push(action);
                if (!fireActions[cwnum]) fireActions[cwnum] = action;
                continue;
            }
            var fm = clip.name.match(/^Fire_(\d+)$/);
            if (!fm) continue;
            var wnum = parseInt(fm[1]);
            // Skip Fire_N clips whose tracks (piece.property) all match the toggle animation
            // (these are redundant door-open anims that conflict with ActivateOpen)
            // Exception: rotary clips should never be skipped — they accumulate rotation.
            if (toggleTrackNames.size > 0 && !(fireRotary && fireRotary[clip.name])) {
                var allInToggle = true;
                for (var ct = 0; ct < clip.tracks.length; ct++) {
                    if (!toggleTrackNames.has(clip.tracks[ct].name.toLowerCase())) { allInToggle = false; break; }
                }
                if (allInToggle) continue;
            }
            var action = mixer.clipAction(clip);
            action.setLoop(THREE.LoopOnce, 1);
            // Detect deploy animations: tracks where end pose differs from start pose
            // (e.g. missile launchers tilting to firing position and staying there).
            // Recoil animations return to rest, so first == last keyframe values.
            var isDeploy = false;
            for (var t = 0; t < clip.tracks.length; t++) {
                var tr = clip.tracks[t], vals = tr.values, stride = vals.length / tr.times.length;
                if (tr.times.length >= 2) {
                    for (var si = 0; si < stride; si++) {
                        if (Math.abs(vals[si] - vals[vals.length - stride + si]) > 0.01) { isDeploy = true; break; }
                    }
                    if (isDeploy) break;
                }
            }
            // Rotary clips (gatling/revolving) intentionally don't return to rest —
            // they must replay every shot, not be treated as one-time deploy anims.
            // Barrel spin clips (minigun spin-up overlay) also don't return to rest.
            if (isDeploy && ((fireRotary && fireRotary[clip.name]) || barrelSpins[clip.name])) {
                isDeploy = false;
            }
            if (isDeploy) {
                action.clampWhenFinished = true;
                _deployActions[wnum] = true;
            } else {
                action.clampWhenFinished = false;
            }
            fireActions[wnum] = action;
        }

        // Resolve rotary piece nodes for accumulative rotation
        // Share one accumulator per piece+axis so all per-barrel clips advance the same spindle
        if ((Object.keys(fireActions).length > 0 || Object.keys(_cycleActions).length > 0) && fireRotary) {
            var _rotaryShared = {};
            for (var clipName in fireRotary) {
                var info = fireRotary[clipName];
                var rKey = info.piece.toLowerCase() + '_' + info.axis;
                if (!_rotaryShared[rKey]) {
                    var targetNode = null;
                    modelScene.traverse(function(n) {
                        if (n.name && n.name.toLowerCase() === info.piece.toLowerCase()) targetNode = n;
                    });
                    if (targetNode) {
                        _rotaryShared[rKey] = {
                            node: targetNode,
                            axis: info.axis,
                            stepRad: info.step_deg * Math.PI / 180,
                            accumRad: 0
                        };
                    }
                }
                if (_rotaryShared[rKey]) {
                    _rotaryNodes[clipName] = _rotaryShared[rKey];
                }
            }
        }
    }

    // Hook: when projectiles system is initialized, call its fireWeapon on each fire
    var _projectileFireFn = null;
    function setProjectileFire(fn) { _projectileFireFn = fn; }

    // Hook: receive weapon data (burst/burstrate) from projectiles system
    var _wpnData = null;
    function setWpnData(data) { _wpnData = data; }
    // Hook: fire a single projectile (no burst) — for per-barrel burst cycling
    var _fireSingleFn = null;
    function setFireSingle(fn) { _fireSingleFn = fn; }

    return { spinPieceNames: spinPieceNames, hideTooltip: hideTooltip, setWeaponHighlight: setWeaponHighlight,
             meshWeaponMap: meshWeaponMap, unitRoleMeshMap: unitRoleMeshMap, visualMeshesByWeapon: visualMeshesByWeapon,
             initFireAnims: initFireAnims, setProjectileFire: setProjectileFire, setWpnData: setWpnData, setFireSingle: setFireSingle };
};
</script>
