<script>
window._barWeaponsSetup = function(THREE, opts) {
    const { modelScene, unitName, material, camera, renderer, lightGroup,
            shouldHideMesh, weaponSummaryOut } = opts;

    const weaponSummary = {};
    var unitRole = null;
    var isToggleable = false;
    modelScene.traverse(function(node) {
        if (node.userData && node.userData.weapon_summary) {
            Object.assign(weaponSummary, node.userData.weapon_summary);
        }
        if (node.userData && node.userData.unit_role) {
            unitRole = node.userData.unit_role;
        }
        if (node.userData && node.userData.toggleable) {
            isToggleable = true;
        }
    });
    Object.assign(weaponSummaryOut, weaponSummary);

    var meshWeaponMap = new Map();
    var visualMeshesByWeapon = new Map();
    modelScene.traverse(function(node) {
        if (!node.isMesh) return;
        var weapons = node.userData && node.userData.weapons;
        var roles = node.userData && node.userData.weapon_roles;
        if (!weapons || !weapons.length || !roles || !roles.length) return;
        if (!roles.includes('visual')) return;
        if (shouldHideMesh(node.name)) return;
        var wnum = weapons[0];
        var summary = weaponSummary[String(wnum)];
        meshWeaponMap.set(node.uuid, { num: wnum, def: summary ? summary.def : null });
        for (var i = 0; i < weapons.length; i++) {
            var wn = weapons[i];
            if (!visualMeshesByWeapon.has(wn)) visualMeshesByWeapon.set(wn, []);
            visualMeshesByWeapon.get(wn).push(node);
        }
    });

    var spinPieceNames = null;
    modelScene.traverse(function(node) {
        if (node.userData && node.userData.spin_pieces) {
            spinPieceNames = new Set(node.userData.spin_pieces.map(function(n) { return n.toLowerCase(); }));
        }
    });

    var unitRoleMeshMap = new Map();

    function getDomWeaponNames() {
        var map = new Map();
        document.querySelectorAll('.uw-item-flex[data-wpn-slug]').forEach(function(el) {
            var slug = el.getAttribute('data-wpn-slug');
            var nameEl = el.querySelector('[wpn-cat-link]');
            var name = nameEl ? nameEl.textContent.trim() : '';
            var desc = el.getAttribute('data-wpn-description') || '';
            if (slug) map.set(slug, { name: name, desc: desc });
        });
        return map;
    }
    function getWeaponInfo(winfo) {
        if (winfo.def) {
            var slug = unitName + '-' + winfo.def.replace(/_/g, '-');
            var names = getDomWeaponNames();
            if (names.has(slug)) return names.get(slug);
        }
        return null;
    }

    var tooltip = document.createElement('div');
    tooltip.style.cssText = 'position:fixed;pointer-events:none;display:none;background:rgba(0,0,0,0.78);color:#fff;font-size:14px;font-family:Poppins,sans-serif;font-weight:300;padding:8px 14px;border-radius:5px;border:1px solid rgba(255,255,255,0.18);white-space:nowrap;z-index:9999;transform:translateZ(0);will-change:transform;-webkit-font-smoothing:antialiased;letter-spacing:-0.3px';
    var tooltipName = document.createElement('div');
    tooltipName.style.cssText = 'text-transform:uppercase;letter-spacing:-0.7px;font-size:16px;font-weight:300';
    var tooltipDesc = document.createElement('div');
    tooltipDesc.style.cssText = 'font-size:12px;font-weight:400;color:rgba(255,255,255,0.6);margin-top:1px;-webkit-font-smoothing:antialiased;letter-spacing:-0.3px';
    tooltip.appendChild(tooltipName);
    tooltip.appendChild(tooltipDesc);
    document.body.appendChild(tooltip);
    var raycaster = new THREE.Raycaster();
    var pointer = new THREE.Vector2();
    var tooltipHideTimer = null;
    function showTooltip(x, y, winfo) {
        var info = getWeaponInfo(winfo);
        if (!info) return;
        tooltipName.textContent = info.name;
        tooltipDesc.textContent = info.desc;
        tooltipDesc.style.display = info.desc ? 'block' : 'none';
        tooltip.style.display = 'block';
        tooltip.style.left = Math.round(x + 14) + 'px';
        tooltip.style.top  = Math.round(y - 8) + 'px';
    }
    function showRoleTooltip(x, y, rl) {
        tooltipName.textContent = rl;
        tooltipDesc.style.display = 'none';
        tooltip.style.display = 'block';
        tooltip.style.left = Math.round(x + 14) + 'px';
        tooltip.style.top  = Math.round(y - 8) + 'px';
    }
    function hideTooltip() { tooltip.style.display = 'none'; }

    var hoveredWeaponNum = null;
    var activeDomEl = null;
    var slugToWnum = new Map();
    for (var wnum in weaponSummary) {
        var s = weaponSummary[wnum];
        if (!s || !s.def) continue;
        slugToWnum.set(unitName + '-' + s.def.replace(/_/g, '-'), parseInt(wnum));
    }

    function setWeaponHighlight(wnum) {
        if (wnum === hoveredWeaponNum) return;
        hoveredWeaponNum = wnum;
        var wnumsToHighlight = new Set();
        if (wnum !== null) {
            var hovDef = weaponSummary[String(wnum)] ? weaponSummary[String(wnum)].def : null;
            for (var wn in weaponSummary) {
                if (hovDef ? weaponSummary[wn].def === hovDef : parseInt(wn) === wnum)
                    wnumsToHighlight.add(parseInt(wn));
            }
        }
        var highlightedUuids = new Set();
        if (wnum !== null) {
            wnumsToHighlight.forEach(function(wn) {
                (visualMeshesByWeapon.get(wn) || []).forEach(function(m) { highlightedUuids.add(m.uuid); });
            });
        }
        modelScene.traverse(function(child) {
            if (!child.isMesh) return;
            if (highlightedUuids.has(child.uuid)) {
                child.userData._targetHighlight = 1.0;
                child.userData._targetDim = 0.0;
            } else {
                child.userData._targetHighlight = 0.0;
                child.userData._targetDim = wnum !== null ? 1.0 : 0.0;
            }
        });
        if (activeDomEl) { activeDomEl.classList.remove('is-hovered'); activeDomEl = null; }
        if (wnum !== null) {
            var sum = weaponSummary[String(wnum)];
            if (sum && sum.def) {
                var fullSlug = unitName + '-' + sum.def.replace(/_/g, '-');
                var domEl = document.querySelector('.uw-item-flex[data-wpn-slug="' + fullSlug + '"]');
                if (domEl) { domEl.classList.add('is-hovered'); activeDomEl = domEl; }
            }
        }
    }

    document.addEventListener('mouseover', function(e) {
        var el = e.target.closest('.uw-item-flex[data-wpn-slug]');
        if (!el) return;
        var slug = el.getAttribute('data-wpn-slug');
        var wn = slugToWnum.get(slug);
        if (wn !== undefined && visualMeshesByWeapon.has(wn)) setWeaponHighlight(wn);
    });
    document.addEventListener('mouseout', function(e) {
        var el = e.target.closest('.uw-item-flex[data-wpn-slug]');
        if (!el) return;
        if (!el.contains(e.relatedTarget)) setWeaponHighlight(null);
    });

    window.addEventListener('mousemove', function(e) {
        if (window._barViewerAltDown) { lightGroup.rotation.y += e.movementX * 0.01; hideTooltip(); setWeaponHighlight(null); return; }
        if (meshWeaponMap.size === 0 && unitRoleMeshMap.size === 0) return;
        var rect = renderer.domElement.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
            hideTooltip();
            if (!e.target.closest('.uw-item-flex[data-wpn-slug]')) setWeaponHighlight(null);
            return;
        }
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        var hits = raycaster.intersectObject(modelScene, true);
        var hit = hits.find(function(h) { return meshWeaponMap.has(h.object.uuid) || unitRoleMeshMap.has(h.object.uuid); });
        if (hit) {
            if (meshWeaponMap.has(hit.object.uuid)) {
                var winfo = meshWeaponMap.get(hit.object.uuid);
                showTooltip(e.clientX, e.clientY, winfo);
                setWeaponHighlight(winfo.num);
            } else {
                showRoleTooltip(e.clientX, e.clientY, unitRoleMeshMap.get(hit.object.uuid));
                setWeaponHighlight(null);
            }
        } else {
            hideTooltip();
            setWeaponHighlight(null);
        }
    });

    renderer.domElement.addEventListener('touchstart', function(e) {
        if (meshWeaponMap.size === 0 || e.touches.length !== 1) return;
        var touch = e.touches[0];
        var rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        var hits = raycaster.intersectObject(modelScene, true);
        var hit = hits.find(function(h) { return meshWeaponMap.has(h.object.uuid); });
        if (hit) {
            showTooltip(touch.clientX, touch.clientY, meshWeaponMap.get(hit.object.uuid));
            clearTimeout(tooltipHideTimer);
            tooltipHideTimer = setTimeout(hideTooltip, 2000);
        }
    }, { passive: true });

    // Fire animation support — called later once mixer + animations are available
    var fireActions = {};  // weapon num → THREE.AnimationAction
    var fireAnimPlaying = false;

    // Read fire_rotary metadata from model extras (gatling spindle advance)
    var fireRotary = null;
    modelScene.traverse(function(node) {
        if (node.userData && node.userData.fire_rotary) {
            fireRotary = node.userData.fire_rotary;
        }
    });

    function initFireAnims(THREE, mixer, animations) {
        if (!mixer || !animations) return;
        for (var i = 0; i < animations.length; i++) {
            var clip = animations[i];
            var fm = clip.name.match(/^Fire_(\d+)$/);
            if (!fm) continue;
            var wnum = parseInt(fm[1]);
            var action = mixer.clipAction(clip);
            action.setLoop(THREE.LoopOnce, 1);
            action.clampWhenFinished = false;
            fireActions[wnum] = action;
        }
        if (Object.keys(fireActions).length === 0) return;

        // Resolve rotary piece nodes for accumulative rotation
        var rotaryNodes = {};  // clip_name → { node, axis, stepRad, accumRad }
        if (fireRotary) {
            var axisMap = { x: 'x', y: 'y', z: 'z' };
            for (var clipName in fireRotary) {
                var info = fireRotary[clipName];
                var targetNode = null;
                modelScene.traverse(function(n) {
                    if (n.name && n.name.toLowerCase() === info.piece.toLowerCase()) targetNode = n;
                });
                if (targetNode) {
                    rotaryNodes[clipName] = {
                        node: targetNode,
                        axis: info.axis,
                        stepRad: info.step_deg * Math.PI / 180,
                        accumRad: 0
                    };
                }
            }
        }

        // Mark weapon meshes that have fire anims with pointer cursor
        meshWeaponMap.forEach(function(winfo) {
            if (fireActions[winfo.num]) {
                renderer.domElement.style.cursor = 'pointer';
            }
        });

        // Find which weapon nums share the same def (same weapon type = same fire anim)
        function getFireAction(wnum) {
            if (fireActions[wnum]) return fireActions[wnum];
            // If this weapon number has no fire anim, check if another weapon with same def does
            var def = weaponSummary[String(wnum)] ? weaponSummary[String(wnum)].def : null;
            if (!def) return null;
            for (var wn in fireActions) {
                var wnDef = weaponSummary[String(wn)] ? weaponSummary[String(wn)].def : null;
                if (wnDef === def) return fireActions[wn];
            }
            return null;
        }

        function playFire(wnum) {
            var action = getFireAction(wnum);
            if (!action || fireAnimPlaying) return;
            fireAnimPlaying = true;
            action.reset().play();
            mixer.addEventListener('finished', function onDone(e) {
                if (e.action === action) {
                    fireAnimPlaying = false;
                    action.stop();
                    // Apply accumulative rotary advance (gatling spindle)
                    var clipName = action.getClip().name;
                    var rot = rotaryNodes[clipName];
                    if (rot) {
                        rot.accumRad += rot.stepRad;
                        rot.node.rotation[rot.axis] = rot.accumRad;
                    }
                    mixer.removeEventListener('finished', onDone);
                }
            });
        }

        // Click on 3D weapon mesh → fire
        renderer.domElement.addEventListener('click', function(e) {
            if (meshWeaponMap.size === 0) return;
            var rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            var hits = raycaster.intersectObject(modelScene, true);
            var hit = hits.find(function(h) { return meshWeaponMap.has(h.object.uuid); });
            if (hit) {
                var winfo = meshWeaponMap.get(hit.object.uuid);
                if (getFireAction(winfo.num)) playFire(winfo.num);
            }
        });

        // Click on DOM weapon list item → fire
        document.addEventListener('click', function(e) {
            var el = e.target.closest('.uw-item-flex[data-wpn-slug]');
            if (!el) return;
            var slug = el.getAttribute('data-wpn-slug');
            var wnum = slugToWnum.get(slug);
            if (wnum !== undefined && getFireAction(wnum)) playFire(wnum);
        });
    }

    return { spinPieceNames: spinPieceNames, hideTooltip: hideTooltip, setWeaponHighlight: setWeaponHighlight,
             meshWeaponMap: meshWeaponMap, unitRoleMeshMap: unitRoleMeshMap, visualMeshesByWeapon: visualMeshesByWeapon,
             initFireAnims: initFireAnims };
};
</script>
