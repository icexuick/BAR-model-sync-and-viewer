<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GLB Local Test</title>
    <style>
        body { margin: 0; background: #1a1a2e; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; font-size: 14px; }
        #info span { background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 3px; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
<div id="info"><span id="status">Loading...</span></div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const params = new URLSearchParams(window.location.search);
const glbFile = params.get('glb') || 'glb/armcom.glb';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(60, 50, 60);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.0;

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(3, 6, 2);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
fillLight.position.set(-3, 2, -4);
scene.add(fillLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.15));

// Grid
const grid = new THREE.GridHelper(200, 40, 0x333355, 0x222244);
scene.add(grid);

let mixer = null;
let activeActions = [];

const loader = new GLTFLoader();
loader.load(glbFile, (gltf) => {
    const model = gltf.scene;

    // Center and scale
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    model.position.sub(center);
    model.position.y += size.y / 2;

    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(maxDim * 1.2, maxDim * 0.9, maxDim * 1.2);
    controls.target.set(0, size.y * 0.35, 0);
    controls.update();

    scene.add(model);

    // Animations
    const status = document.getElementById('status');
    if (gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(model);
        const names = gltf.animations.map(a => a.name);
        status.textContent = `${glbFile} | Animations: ${names.join(', ')}`;

        // Play walk animation if found
        const walkClip = gltf.animations.find(a =>
            a.name.toLowerCase().includes('walk') && !a.name.toLowerCase().includes('stop'));
        if (walkClip) {
            const action = mixer.clipAction(walkClip);
            action.setLoop(THREE.LoopRepeat);
            action.play();
            activeActions.push(action);
        }

        // Play spin animations
        gltf.animations.filter(a => a.name.toLowerCase().includes('spin')).forEach(clip => {
            const action = mixer.clipAction(clip);
            action.setLoop(THREE.LoopRepeat);
            action.play();
            activeActions.push(action);
        });
    } else {
        status.textContent = `${glbFile} | No animations`;
    }
}, (progress) => {
    const pct = progress.total ? Math.round(progress.loaded / progress.total * 100) : '?';
    document.getElementById('status').textContent = `Loading ${glbFile}... ${pct}%`;
}, (error) => {
    document.getElementById('status').textContent = `Error: ${error.message}`;
    console.error(error);
});

const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
